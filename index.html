<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC 2026 Fantasy Draft Order</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

    header { padding: 1.25rem 2rem 1.25rem calc(2rem - 6px); border-left: 6px solid #0076B6; border-bottom: 1px solid rgba(187,185,185,0.2); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; background: #000000; }
    .header-main { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .header-icon { width: 44px; height: 44px; border-radius: 50%; background: #0076B6; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    h1 { font-size: 1.25rem; font-weight: 700; color: #ffffff; }
    #status { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.2rem; }
    .header-stats { display: flex; gap: 10px; flex-shrink: 0; }
    .stat-box { text-align: center; padding: 5px 14px; border: 1px solid rgba(187,185,185,0.2); border-radius: 6px; }
    .stat-box-value { font-size: 1.1rem; font-weight: 700; line-height: 1; color: #ffffff; }
    .stat-box-value.stat-left { color: #0076B6; }
    .stat-box-label { font-size: 0.6rem; color: #BBB9B9; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

    button { background: #0076B6; color: white; border: none; padding: 0.35rem 0.9rem; border-radius: 5px; cursor: pointer; font-size: 0.8rem; transition: background 0.15s; }
    button:hover { background: #005f92; }
    button:disabled { background: #1a1a1a; color: #555; cursor: not-allowed; }
    .auto-refresh { font-size: 0.75rem; color: #888; }

    .grid-wrapper { padding: 1.25rem 2rem; overflow-x: auto; }

    table { border-collapse: collapse; font-size: 0.75rem; white-space: nowrap; }

    th {
      background: #0076B6;
      padding: 0.45rem 0.6rem;
      text-align: center;
      font-weight: 600;
      color: #ffffff;
      border: 1px solid rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    th.corner {
      text-align: left;
      color: rgba(255,255,255,0.85);
      position: sticky;
      left: 0;
      z-index: 3;
    }

    .team-name {
      padding: 0.4rem 0.6rem;
      white-space: nowrap;

      font-weight: 500;
      background: #0a0a0a;
      position: sticky;

      font-size: 0.75rem;
      font-weight: 600;

      overflow: hidden;
    }

    .top-order-row { display: flex; flex-wrap: nowrap; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem; }
    .order-chip { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; background: #111; border: 1px solid rgba(187,185,185,0.15); border-radius: 8px; padding: 0.5rem 0.6rem; white-space: nowrap; flex-shrink: 0; min-width: 36px; }

    .order-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .order-team-name { font-size: 0.7rem; color: #cbd5e1; font-weight: 500; text-align: center; white-space: normal; line-height: 1.2; }
    .banner-toggle { display: flex; background: #0a0a0a; border-radius: 5px; overflow: hidden; border: 1px solid rgba(187,185,185,0.3); }
    .banner-tab { background: transparent; color: #888; border: none; padding: 0.2rem 0.65rem; font-size: 0.75rem; cursor: pointer; border-radius: 0; transition: background 0.15s, color 0.15s; }
    .banner-tab:hover { color: #BBB9B9; }
    .banner-tab-active { background: #0076B6; color: #ffffff; }

      .stat-box { padding: 4px 10px; }
      .stat-box-value { font-size: 0.95rem; }
      .controls { padding: 0.5rem 0.75rem; flex-direction: column; align-items: stretch; }
      .controls button { width: 100%; }
      #top-orders { padding: 0.75rem 0.75rem; }
      .grid-wrapper { padding: 0.75rem 0.75rem; }
      .legend { padding: 0.75rem; }

      .order-logo { width: 28px; height: 28px; }

<body>
  <header>
    <div class="header-main">
      <div class="header-icon">⚽</div>

        <h1>WC 2026 Fantasy Draft Order</h1>

<script>
// ─── FLAG & LOGO ASSETS ─────────────────────────────────────────────────────
const FLAG_CODE = {

};

function flagUrl(country) {
  const code = FLAG_CODE[country];
  return code ? `https://flagcdn.com/w40/${code}.png` : null;
}

function flagImg(country) {
  const url = flagUrl(country);
  return url ? `<img class="flag-img" src="${url}" alt="${country}" title="${country}">` : '';
}

function teamLogoImg(fantasyTeam) {
  const src = `assets/teams/${encodeURIComponent(fantasyTeam)}.png`;
  return `<img class="team-logo" src="${src}" alt="${fantasyTeam}" onerror="this.style.display='none';this.nextSibling.style.display='inline-block'"><span class="team-logo-placeholder" style="display:none"></span>`;
}

// ─── FANTASY TEAM ALLOCATIONS ───────────────────────────────────────────────
const FANTASY_TEAMS = {
  'Kurlewis':      ['Iran', 'Egypt', 'Saudi Arabia'],
  'Seamen':        ['Colombia', 'New Zealand', 'Norway'],
  'A&T':           ['Canada', 'Sweden', 'England'],
  'Barons':        ['Spain', 'Türkiye', 'Haiti'],
  'SDs':           ['Portugal', 'Ghana', 'Germany'],
  'Dirty Birds':   ['Ivory Coast', 'Netherlands', 'USA'],
  'Aligators':     ['South Korea', 'Iraq', 'Tunisia'],
  'Dynamics':      ['Qatar', 'Senegal', 'Austria'],
  'SERPION':       ['Jordan', 'Switzerland', 'Australia'],
  'Fishies':       ['Belgium', 'Czechia', 'DR Congo'],
  'Piggies':       ['Uzbekistan', 'Bosnia & Herzegovina', 'France'],
  'Puffins':       ['South Africa', 'Scotland', 'Curaçao'],
  'Ester':         ['Ecuador', 'Mexico', 'Uruguay'],
  'Puddings':      ['Argentina', 'Algeria', 'Brazil'],
  'Leeanacondas':  ['Panama', 'Cabo Verde', 'Japan'],
  'Pat':           ['Morocco', 'Croatia', 'Paraguay'],
};

// ─── TEAM STRENGTHS (FIFA ranking points, approx. June 2026) ────────────────
const TEAM_STRENGTH = {
  'Argentina':            1877,
  'Spain':                1875,
  'France':               1871,
  'England':              1828,
  'Portugal':             1768,
  'Brazil':               1766,
  'Netherlands':          1740,
  'Belgium':              1725,
  'Germany':              1715,
  'Croatia':              1700,
  'Italy':                1685,
  'Uruguay':              1670,
  'Colombia':             1655,
  'Morocco':              1640,
  'USA':                  1625,
  'Mexico':               1610,
  'Japan':                1600,
  'Switzerland':          1590,
  'Senegal':              1580,
  'Iran':                 1570,
  'South Korea':          1560,
  'Ecuador':              1550,
  'Australia':            1535,
  'Austria':              1525,
  'Türkiye':              1515,
  'Denmark':              1505,
  'Norway':               1500,
  'Canada':               1490,
  'Sweden':               1515,
  'Ivory Coast':          1533,
  'Ghana':                1485,
  'Paraguay':             1503,
  'Algeria':              1470,
  'Tunisia':              1483,
  'Panama':               1541,
  'Qatar':                1450,
  'Egypt':                1460,
  'Saudi Arabia':         1445,
  'Scotland':             1498,
  'South Africa':         1430,
  'DR Congo':             1478,
  'Bosnia & Herzegovina': 1465,
  'Czechia':              1501,
  'Uzbekistan':           1440,
  'Jordan':               1430,
  'Iraq':                 1420,
  'New Zealand':          1410,
  'Cabo Verde':           1395,
  'Curaçao':              1350,
  'Haiti':                1340,
};

const AVG_STRENGTH = Object.values(TEAM_STRENGTH).reduce((a, b) => a + b, 0) / Object.values(TEAM_STRENGTH).length;

function getStrength(team) {
  return TEAM_STRENGTH[team] || AVG_STRENGTH;
}

// Lambda for Poisson goal model scaled by team strength.
// Squared ratio amplifies the gap between strong and weak teams —
// linear scaling was too compressed (Spain vs Cabo Verde looked nearly even).
function goalLambda(team) {
  const ratio = getStrength(team) / AVG_STRENGTH;
  return Math.max(0.3, Math.min(4.0, 1.3 * ratio * ratio * ratio * ratio));
}

// ESPN display name → canonical name used above
const ESPN_NORMALIZE = {
  'United States':        'USA',
  'Bosnia-Herzegovina':   'Bosnia & Herzegovina',
  "Côte d'Ivoire":        'Ivory Coast',
  'Korea Republic':       'South Korea',
  'Republic of Korea':    'South Korea',
  'Congo DR':             'DR Congo',
  'Cape Verde':           'Cabo Verde',
  'Cabo Verde':           'Cabo Verde',
  'Curacao':              'Curaçao',
  'Turkey':               'Türkiye',
  'Czech Republic':       'Czechia',
  'New Zealand':          'New Zealand',
  'DR Congo':             'DR Congo',
};

function normalize(name) {
  return ESPN_NORMALIZE[name] || name;
}

// ─── SEEDED PRNG (mulberry32) ────────────────────────────────────────────────
let _rngState = 1;
function seedRng(seed) {
  _rngState = seed >>> 0 || 1;
}
function rng() {
  _rngState |= 0;
  _rngState = _rngState + 0x6D2B79F5 | 0;
  let t = Math.imul(_rngState ^ _rngState >>> 15, 1 | _rngState);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

// ─── STAGE ENUM ─────────────────────────────────────────────────────────────
const STAGE = {
  GROUP_ELIMINATED: 0,
  R32_ELIMINATED:   1,
  R16_ELIMINATED:   2,
  QF_ELIMINATED:    3,
  SF_LOST_3RD:      4,
  SF_WON_3RD:       5,
  RUNNER_UP:        6,
  WINNER:           7,
};

const STAGE_LABEL = {
  0: 'Group Out',
  1: 'R32 Out',
  2: 'R16 Out',
  3: 'QF Out',
  4: '4th Place',
  5: '3rd Place',
  6: 'Runner-up',
  7: 'Winner',
};

// ─── ROUND DETECTION ────────────────────────────────────────────────────────
function parseRound(event) {
  const note = (event.competitions[0]?.altGameNote || '').toLowerCase();
  const date = event.date.substring(0, 10);

  if (note.includes('group'))                                     return 'GROUP';
  if (note.includes('round of 32'))                              return 'R32';
  if (note.includes('round of 16') || note.includes('rd of 16')) return 'R16';
  if (note.includes('quarterfinal') || note.includes('quarter')) return 'QF';
  if (note.includes('third') || note.includes('3rd'))            return 'THIRD';
  if (note.includes('semifinal') || note.includes('semi'))       return 'SF';
  if (note.includes('final'))                                     return 'FINAL';

  // Date-based fallback
  if (date >= '2026-07-19') return 'FINAL';
  if (date >= '2026-07-18') return 'THIRD';
  if (date >= '2026-07-14') return 'SF';
  if (date >= '2026-07-09') return 'QF';
  if (date >= '2026-07-04') return 'R16';
  if (date >= '2026-06-28') return 'R32';
  return 'GROUP';
}

// ─── DATA FETCHING ───────────────────────────────────────────────────────────
async function fetchAllGames() {
  const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200';
  const res = await fetch(url);
  if (!res.ok) throw new Error(`ESPN API ${res.status}`);
  const data = await res.json();
  return data.events || [];
}

// ─── STATE PARSING ───────────────────────────────────────────────────────────
function parseTournamentState(events) {
  const groupStandings = {};   // group → { team → { pts, gf, ga, gp } }
  const groupTeams = {};       // group → Set of team names
  const groupGames = [];       // all group-stage game objects
  const allTeamStats = {};     // team → { gf, ga } (real stats from completed games)
  const knockoutEliminated = {};  // team → STAGE value (for completed knockout)
  const knockoutAlive = new Set(); // teams known to have won a knockout game

  function statsOf(name) {
    if (!allTeamStats[name]) allTeamStats[name] = { gf: 0, ga: 0 };
    return allTeamStats[name];
  }

  for (const event of events) {
    const round = parseRound(event);
    const comp = event.competitions[0];
    if (!comp || comp.competitors.length < 2) continue;

    const c0 = comp.competitors[0], c1 = comp.competitors[1];
    const home = normalize(c0.team.displayName);
    const away = normalize(c1.team.displayName);
    const done = comp.status.type.completed;
    const hg = done ? parseInt(c0.score || '0') : null;
    const ag = done ? parseInt(c1.score || '0') : null;
    const homeWin = done ? !!c0.winner : null;
    const awayWin = done ? !!c1.winner : null;

    if (round === 'GROUP') {
      const m = (comp.altGameNote || '').match(/Group ([A-L])/i);
      const group = m ? m[1].toUpperCase() : null;

      if (group) {
        if (!groupTeams[group]) groupTeams[group] = new Set();
        groupTeams[group].add(home);
        groupTeams[group].add(away);

        if (!groupStandings[group]) groupStandings[group] = {};
        const gs = groupStandings[group];
        if (!gs[home]) gs[home] = { pts: 0, gf: 0, ga: 0, gp: 0 };
        if (!gs[away]) gs[away] = { pts: 0, gf: 0, ga: 0, gp: 0 };

        if (done && hg !== null) {
          gs[home].gp++; gs[away].gp++;
          gs[home].gf += hg; gs[home].ga += ag;
          gs[away].gf += ag; gs[away].ga += hg;
          if (homeWin)       { gs[home].pts += 3; }
          else if (awayWin)  { gs[away].pts += 3; }
          else               { gs[home].pts += 1; gs[away].pts += 1; }

          statsOf(home).gf += hg; statsOf(home).ga += ag;
          statsOf(away).gf += ag; statsOf(away).ga += hg;
        }
      }
      groupGames.push({ home, away, hg, ag, homeWin, awayWin, done, group });

    } else {
      // Knockout
      if (done && hg !== null) {
        statsOf(home).gf += hg; statsOf(home).ga += ag;
        statsOf(away).gf += ag; statsOf(away).ga += hg;

        const loser  = homeWin ? away : (awayWin ? home : null);
        const winner = homeWin ? home : (awayWin ? away : null);

        if (round === 'FINAL') {
          if (loser)  knockoutEliminated[loser]  = STAGE.RUNNER_UP;
          if (winner) knockoutEliminated[winner] = STAGE.WINNER;
        } else if (round === 'THIRD') {
          if (loser)  knockoutEliminated[loser]  = STAGE.SF_LOST_3RD;
          if (winner) knockoutEliminated[winner] = STAGE.SF_WON_3RD;
        } else {
          const stageMap = { R32: STAGE.R32_ELIMINATED, R16: STAGE.R16_ELIMINATED, QF: STAGE.QF_ELIMINATED, SF: STAGE.SF_LOST_3RD };
          if (loser) knockoutEliminated[loser] = stageMap[round] ?? STAGE.R32_ELIMINATED;
          if (winner && round !== 'SF') knockoutAlive.add(winner);
        }
      }
    }
  }

  const completedCount = events.filter(e => e.competitions[0]?.status?.type?.completed).length;
  return { groupStandings, groupTeams, groupGames, allTeamStats, knockoutEliminated, knockoutAlive, completedCount };
}

// ─── SIMULATION ENGINE ───────────────────────────────────────────────────────
function poisson(lambda) {
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= rng(); } while (p > L);
  return k - 1;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sortGroup(teams, standings) {
  return [...teams].sort((a, b) => {
    const sa = standings[a] || { pts: 0, gf: 0, ga: 0, gp: 0 };
    const sb = standings[b] || { pts: 0, gf: 0, ga: 0, gp: 0 };
    if (sb.pts !== sa.pts) return sb.pts - sa.pts;
    const gdB = sb.gf - sb.ga, gdA = sa.gf - sa.ga;
    if (gdB !== gdA) return gdB - gdA;
    if (sb.gf !== sa.gf) return sb.gf - sa.gf;
    return rng() - 0.5;
  });
}

function runOneSimulation(state) {
  const { groupStandings: baseSt, groupTeams, groupGames, allTeamStats, knockoutEliminated, knockoutAlive } = state;

  // Clone group standings
  const st = {};
  for (const [g, teams] of Object.entries(baseSt)) {
    st[g] = {};
    for (const [t, s] of Object.entries(teams)) st[g][t] = { ...s };
  }

  // Clone team stats
  const stats = {};
  for (const [t, s] of Object.entries(allTeamStats)) stats[t] = { ...s };
  function statsOf(t) { if (!stats[t]) stats[t] = { gf: 0, ga: 0 }; return stats[t]; }

  // Simulate remaining group games
  for (const g of groupGames) {
    if (g.done || !g.group) continue;
    const hg = poisson(goalLambda(g.home)), ag = poisson(goalLambda(g.away));
    if (!st[g.group]) st[g.group] = {};
    const gs = st[g.group];
    if (!gs[g.home]) gs[g.home] = { pts: 0, gf: 0, ga: 0, gp: 0 };
    if (!gs[g.away]) gs[g.away] = { pts: 0, gf: 0, ga: 0, gp: 0 };
    gs[g.home].gp++; gs[g.away].gp++;
    gs[g.home].gf += hg; gs[g.home].ga += ag;
    gs[g.away].gf += ag; gs[g.away].ga += hg;
    if (hg > ag)      { gs[g.home].pts += 3; }
    else if (ag > hg) { gs[g.away].pts += 3; }
    else              { gs[g.home].pts += 1; gs[g.away].pts += 1; }
    statsOf(g.home).gf += hg; statsOf(g.home).ga += ag;
    statsOf(g.away).gf += ag; statsOf(g.away).ga += hg;
  }

  // Determine 32 qualifiers
  const qualifiers = new Set();
  const stage = {};
  const thirdCandidates = [];

  for (const [group, teamSet] of Object.entries(groupTeams)) {
    const sorted = sortGroup([...teamSet], st[group] || {});
    if (sorted[0]) qualifiers.add(sorted[0]);
    if (sorted[1]) qualifiers.add(sorted[1]);
    if (sorted[2]) {
      const s = (st[group] || {})[sorted[2]] || { pts: 0, gf: 0, ga: 0 };
      thirdCandidates.push({ team: sorted[2], pts: s.pts, gd: s.gf - s.ga, gf: s.gf });
    }
    if (sorted[3]) stage[sorted[3]] = STAGE.GROUP_ELIMINATED;
  }

  // Best 8 of 12 third-place teams advance
  thirdCandidates.sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd  !== a.gd)  return b.gd  - a.gd;
    if (b.gf  !== a.gf)  return b.gf  - a.gf;
    return rng() - 0.5;
  });
  for (let i = 0; i < thirdCandidates.length; i++) {
    if (i < 8) qualifiers.add(thirdCandidates[i].team);
    else stage[thirdCandidates[i].team] = STAGE.GROUP_ELIMINATED;
  }

  // Apply known knockout results
  for (const [team, s] of Object.entries(knockoutEliminated)) stage[team] = s;

  // Build current alive list (qualifiers not yet eliminated, plus known knockout winners)
  const alreadyElim = new Set(Object.keys(knockoutEliminated));
  let alive = [...qualifiers, ...knockoutAlive].filter(t => !alreadyElim.has(t));
  // Deduplicate
  alive = [...new Set(alive)];

  // Simulate knockout rounds
  let sfLosers = [];
  for (const round of ['R32', 'R16', 'QF', 'SF']) {
    if (alive.length < 2) break;
    const pairs = shuffle(alive);
    const winners = [], losers = [];
    for (let i = 0; i + 1 < pairs.length; i += 2) {
      const [t1, t2] = [pairs[i], pairs[i + 1]];
      const hg = poisson(goalLambda(t1)), ag = poisson(goalLambda(t2));
      const s1 = getStrength(t1), s2 = getStrength(t2);
      const t1wins = hg > ag || (hg === ag && rng() < s1 / (s1 + s2));
      winners.push(t1wins ? t1 : t2);
      const loser = t1wins ? t2 : t1;
      losers.push(loser);
      if (!stage[loser]) {
        stage[loser] = { R32: STAGE.R32_ELIMINATED, R16: STAGE.R16_ELIMINATED, QF: STAGE.QF_ELIMINATED, SF: STAGE.SF_LOST_3RD }[round];
      }
      statsOf(t1).gf += hg; statsOf(t1).ga += ag;
      statsOf(t2).gf += ag; statsOf(t2).ga += hg;
    }
    if (round === 'SF') sfLosers = losers;
    alive = winners;
  }

  // 3rd place match
  if (sfLosers.length >= 2) {
    const [l1, l2] = sfLosers;
    const sl1 = getStrength(l1), sl2 = getStrength(l2);
    if (rng() < sl1 / (sl1 + sl2)) { stage[l1] = STAGE.SF_WON_3RD; stage[l2] = STAGE.SF_LOST_3RD; }
    else                                    { stage[l2] = STAGE.SF_WON_3RD; stage[l1] = STAGE.SF_LOST_3RD; }
  } else if (sfLosers.length === 1) {
    stage[sfLosers[0]] = STAGE.SF_LOST_3RD;
  }

  // Final
  if (alive.length >= 2) {
    const [f1, f2] = alive;
    const hg = poisson(goalLambda(f1)), ag = poisson(goalLambda(f2));
    const sf1 = getStrength(f1), sf2 = getStrength(f2);
    const f1wins = hg > ag || (hg === ag && rng() < sf1 / (sf1 + sf2));
    stage[f1wins ? f1 : f2] = STAGE.WINNER;
    stage[f1wins ? f2 : f1] = STAGE.RUNNER_UP;
    statsOf(f1).gf += hg; statsOf(f1).ga += ag;
    statsOf(f2).gf += ag; statsOf(f2).ga += hg;
  } else if (alive.length === 1) {
    stage[alive[0]] = STAGE.WINNER;
  }

  return { stage, stats };
}

function rankFantasyTeams(stage, stats) {
  return Object.keys(FANTASY_TEAMS)
    .map(team => {
      const wcTeams = FANTASY_TEAMS[team];
      const stages = wcTeams.map(t => stage[t] ?? STAGE.GROUP_ELIMINATED).sort((a, b) => b - a);
      const totalGF = wcTeams.reduce((s, t) => s + (stats[t]?.gf || 0), 0);
      const totalGA = wcTeams.reduce((s, t) => s + (stats[t]?.ga || 0), 0);
      return { team, stages, totalGF, totalGA };
    })
    .sort((a, b) => {
      for (let i = 0; i < 3; i++) {
        const diff = (b.stages[i] ?? 0) - (a.stages[i] ?? 0);
        if (diff !== 0) return diff;
      }
      if (b.totalGF !== a.totalGF) return b.totalGF - a.totalGF;
      if (a.totalGA !== b.totalGA) return a.totalGA - b.totalGA;
      return rng() - 0.5; // coin flip
    })
    .map(s => s.team);
}

function runMonteCarlo(state, N = 10000) {
  seedRng(state.completedCount);
  const teams = Object.keys(FANTASY_TEAMS);
  const counts = {};
  for (const t of teams) counts[t] = new Array(16).fill(0);
  const orderCounts = {};

  for (let i = 0; i < N; i++) {
    const { stage, stats } = runOneSimulation(state);
    const ranked = rankFantasyTeams(stage, stats);
    ranked.forEach((team, idx) => counts[team][idx]++);
    const key = ranked.join('|');
    orderCounts[key] = (orderCounts[key] || 0) + 1;
  }

  const probs = {};
  const adp = {};
  for (const t of teams) {
    probs[t] = counts[t].map(c => (c / N) * 100);
    adp[t] = counts[t].reduce((sum, c, i) => sum + c * (i + 1), 0) / N;
  }

  const topOrders = Object.entries(orderCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([key, cnt]) => ({ order: key.split('|'), pct: (cnt / N) * 100 }));

  return { probs, topOrders, adp };
}

// ─── CURRENT BEST ESTIMATE (deterministic) ──────────────────────────────────
function getBestEstimate(state) {
  // Use current known results, treat all unknowns as "alive" at group level
  const { groupStandings, groupTeams, allTeamStats, knockoutEliminated } = state;
  const stage = { ...knockoutEliminated };

  // For group stage, mark clearly eliminated teams (mathematically out)
  for (const [group, teamSet] of Object.entries(groupTeams)) {
    const sorted = sortGroup([...teamSet], groupStandings[group] || {});
    // Only mark 4th place if all games in group are played
    const gs = groupStandings[group] || {};
    const allPlayed = [...teamSet].every(t => (gs[t]?.gp ?? 0) >= 3);
    if (allPlayed) {
      if (sorted[3] && !stage[sorted[3]]) stage[sorted[3]] = STAGE.GROUP_ELIMINATED;
    }
  }

  // Score fantasy teams on current known results
  return Object.keys(FANTASY_TEAMS).map(team => {
    const wcTeams = FANTASY_TEAMS[team];
    const stages = wcTeams.map(t => stage[t] ?? STAGE.GROUP_ELIMINATED).sort((a, b) => b - a);
    const totalGF = wcTeams.reduce((s, t) => s + (allTeamStats[t]?.gf || 0), 0);
    const totalGA = wcTeams.reduce((s, t) => s + (allTeamStats[t]?.ga || 0), 0);
    return { team, stages, totalGF, totalGA };
  });
}

// ─── HEAT MAP COLOR ─────────────────────────────────────────────────────────
function heatColor(pct) {
  // 0% → near-black, high% → Detroit Lions blue (#0076B6)
  const t = Math.min(pct / 40, 1); // saturate at 40%
  const r = Math.round(5  + t * (0   - 5));
  const g = Math.round(5  + t * (118 - 5));
  const b = Math.round(15 + t * (182 - 15));
  const textOpacity = pct < 0.5 ? 0.25 : (0.4 + t * 0.6);
  return {
    bg: `rgb(${r},${g},${b})`,
    text: `rgba(255,255,255,${textOpacity})`
  };
}

// ─── TOP ORDERS RENDER ───────────────────────────────────────────────────────
const LOCK_THRESHOLD = 99; // % — position is considered locked in

function renderTopOrders(topOrders, probs, adp) {
  if (!topOrders || !adp) return;

  const isAdp = orderBannerMode === 'adp';

  let chips;
  if (isAdp) {
    const sorted = Object.keys(adp).sort((a, b) => adp[a] - adp[b]);
    chips = sorted.map((team) => {
      const src = `assets/teams/${encodeURIComponent(team)}.png`;
      return `<div class="order-chip">
        <span class="order-pick-num">${adp[team].toFixed(1)}</span>
        <img class="order-logo" src="${src}" alt="${team}" onerror="this.style.display='none'">
        <span class="order-team-name">${team}</span>
      </div>`;
    }).join('');
  } else {
    const best = topOrders[0];
    chips = best.order.map((team, i) => {
      const src = `assets/teams/${encodeURIComponent(team)}.png`;
      const locked = probs && (probs[team]?.[i] ?? 0) >= LOCK_THRESHOLD;
      return `<div class="order-chip ${locked ? 'order-chip-locked' : ''}">
        <span class="order-pick-num">${i + 1}</span>
        <img class="order-logo" src="${src}" alt="${team}" onerror="this.style.display='none'">
        <span class="order-team-name">${team}</span>
      </div>`;
    }).join('');
  }

  const total = topOrders.reduce((s, o) => s + o.pct, 0).toFixed(1);
  const rows = topOrders.map((o, i) => {
    const picks = o.order.map((t, j) => `<span class="dd-pick">${j + 1}. ${t}</span>`).join('');
    return `<div class="dd-row ${i === 0 ? 'dd-row-top' : ''}">
      <span class="dd-rank">#${i + 1}</span>
      <span class="dd-pct">${o.pct.toFixed(2)}%</span>
      <div class="dd-teams">${picks}</div>
    </div>`;
  }).join('');

  document.getElementById('top-orders').innerHTML = `
    <div class="top-order-header">
      <span class="top-order-label">${isAdp ? 'Average Draft Position' : 'Most Common Draft Order'}</span>
      ${!isAdp ? `<span class="top-order-pct">${topOrders[0].pct.toFixed(2)}%</span>` : ''}
      <div class="banner-toggle">
        <button class="banner-tab ${isAdp ? 'banner-tab-active' : ''}" onclick="orderBannerMode='adp'; renderTopOrders(lastTopOrders, lastProbs, lastAdp)">Avg Position</button>
        <button class="banner-tab ${!isAdp ? 'banner-tab-active' : ''}" onclick="orderBannerMode='likely'; renderTopOrders(lastTopOrders, lastProbs, lastAdp)">Most Common</button>
      </div>
      ${!isAdp ? `<button class="top-order-toggle" onclick="document.getElementById('dd-full').classList.toggle('hidden')">Top 10 ▾</button>` : ''}
    </div>
    <div class="top-order-row">${chips}</div>
    ${!isAdp ? `<div id="dd-full" class="hidden">
      <div class="dd-header">Top 10 most likely orderings · combined probability: <strong>${total}%</strong></div>
      ${rows}
    </div>` : ''}
  `;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const STAGE_STYLE = {
  0: { bg: '#2a1212', color: '#f87171', label: 'Group Out' },
  1: { bg: '#2a1e10', color: '#fb923c', label: 'R32 Out' },
  2: { bg: '#2a2710', color: '#fbbf24', label: 'R16 Out' },
  3: { bg: '#162810', color: '#86efac', label: 'QF Out' },
  4: { bg: '#0f2a1e', color: '#34d399', label: '4th Place' },
  5: { bg: '#0f2a1e', color: '#34d399', label: '3rd Place' },
  6: { bg: '#0f1f2a', color: '#60a5fa', label: 'Runner-up' },
  7: { bg: '#2a2410', color: '#fcd34d', label: 'Winner' },
};

function renderGrid(probs, currentEstimate, state, sortCol = currentSortCol) {
  const table = document.getElementById('grid');
  table.innerHTML = '';

  // Build per-WC-team stage from state
  const wcTeamStage = { ...state.knockoutEliminated };

  const fantasyTeams = Object.keys(FANTASY_TEAMS);
  const sortedTeams = sortTeams(fantasyTeams, probs, sortCol);

  // Header
  const hr = document.createElement('tr');
  const cornerTh = `<th class="corner">Fantasy Team</th>`;
  const pickThs = Array.from({ length: 16 }, (_, i) => {
    const active = sortCol === i ? 'sort-active' : '';
    return `<th class="sortable ${active}" data-pick="${i}">Pick ${i + 1}</th>`;
  }).join('');
  hr.innerHTML = cornerTh + pickThs;
  table.appendChild(hr);

  // Column header click → sort by that pick
  hr.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      currentSortCol = parseInt(th.dataset.pick);
      if (lastProbs) renderGrid(lastProbs, lastEstimate, lastState, currentSortCol);
      if (lastTopOrders) renderTopOrders(lastTopOrders, lastProbs, lastAdp);
    });
  });

  for (const team of sortedTeams) {
    const wcTeams = FANTASY_TEAMS[team];

    // ── Main row ──
    const row = document.createElement('tr');

    const td = document.createElement('td');
    td.className = 'team-name';
    td.innerHTML = `<span class="toggle">▶</span>${teamLogoImg(team)}${team}`;

    // Probability cells
    for (let pick = 0; pick < 16; pick++) {
      const pct = probs[team][pick];
      const { bg, text } = heatColor(pct);
      const cell = document.createElement('td');
      cell.className = 'prob-cell';
      cell.style.background = bg;
      cell.style.color = text;
      cell.textContent = `${pct.toFixed(1)}%`;
      cell.title = `${team} → Pick ${pick + 1}: ${pct.toFixed(1)}%`;
      row.appendChild(cell);
    }

    row.insertBefore(td, row.firstChild);
    table.appendChild(row);

    // ── Detail row ──
    const detailRow = document.createElement('tr');
    detailRow.className = 'detail-row hidden';

    const detailTd = document.createElement('td');
    detailTd.colSpan = 17;

    const inner = document.createElement('div');
    inner.className = 'detail-inner';

    for (const wc of wcTeams) {
      const s = wcTeamStage[wc];
      const style = s !== undefined ? STAGE_STYLE[s] : { bg: '#1e293b', color: '#64748b', label: 'In Progress' };
      const gf = state.allTeamStats[wc]?.gf ?? 0;
      const ga = state.allTeamStats[wc]?.ga ?? 0;

      inner.innerHTML += `
        <div class="detail-team">
          ${flagImg(wc)}
          <span class="detail-team-name">${wc}</span>
          <span class="detail-stage" style="background:${style.bg};color:${style.color}">${style.label}</span>
          <span class="detail-goals">${gf} GF · ${ga} GA</span>
        </div>`;
    }

    detailTd.appendChild(inner);
    detailRow.appendChild(detailTd);
    table.appendChild(detailRow);

    // Toggle on click
    td.addEventListener('click', () => {
      const isOpen = !detailRow.classList.contains('hidden');
      detailRow.classList.toggle('hidden', isOpen);
      td.classList.toggle('expanded', !isOpen);
    });
  }
}

function buildLegend() {
  const bar = document.getElementById('legend-bar');
  const steps = 20;
  let html = '';
  for (let i = 0; i < steps; i++) {
    const pct = (i / steps) * 40;
    html += `<div style="background:${heatColor(pct).bg}"></div>`;
  }
  bar.innerHTML = html;
}

// ─── MAIN ────────────────────────────────────────────────────────────────────
let refreshTimer = null;
let isRunning = false;
let lastProbs = null;
let lastTopOrders = null;
let lastAdp = null;
let orderBannerMode = 'adp'; // 'adp' | 'likely'
let lastEstimate = null;
let lastState = null;
let currentSortCol = null; // null = sort by peak pick, 0-15 = sort by that pick descending

function sortTeams(fantasyTeams, probs, sortCol) {
  return [...fantasyTeams].sort((a, b) => {
    if (sortCol !== null) {
      return probs[b][sortCol] - probs[a][sortCol];
    }
    // Default: sort by the pick index where each team has their highest probability
    const bestPickA = probs[a].indexOf(Math.max(...probs[a]));
    const bestPickB = probs[b].indexOf(Math.max(...probs[b]));
    return bestPickA - bestPickB;
  });
}

async function refresh() {
  if (isRunning) return;
  isRunning = true;
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;

  document.getElementById('status').innerHTML = '<span class="spinner"></span>Fetching live data…';

  try {
    const events = await fetchAllGames();
    document.getElementById('status').innerHTML = '<span class="spinner"></span>Running Monte Carlo simulation (10,000 runs)…';

    const state = parseTournamentState(events);

    // Run simulation asynchronously so browser can update the status text
    await new Promise(resolve => setTimeout(resolve, 30));

    const { probs, topOrders, adp } = runMonteCarlo(state, 10000);
    const currentEstimate = getBestEstimate(state);

    lastProbs = probs;
    lastTopOrders = topOrders;
    lastAdp = adp;
    lastEstimate = currentEstimate;
    lastState = state;
    renderTopOrders(topOrders, probs, adp);
    renderGrid(probs, currentEstimate, state, currentSortCol);

    const now = new Date();
    const pendingGames = events.length - state.completedCount;
    document.getElementById('status').textContent = `Last updated: ${now.toLocaleTimeString()} · ${state.completedCount} of ${events.length} games`;
    document.getElementById('stat-done').textContent = state.completedCount;
    document.getElementById('stat-left').textContent = pendingGames;

    // Warn about any unrecognized team names
    const knownTeams = new Set(Object.values(FANTASY_TEAMS).flat());
    const seenTeams = new Set();
    for (const e of events) {
      const comp = e.competitions?.[0];
      if (!comp) continue;
      for (const c of comp.competitors) seenTeams.add(normalize(c.team.displayName));
    }
    const missing = [...knownTeams].filter(t => !seenTeams.has(t));
    const simInfoEl = document.getElementById('sim-info');
    let infoText = `Monte Carlo: 10,000 simulations · FIFA ranking-weighted goal model · Strength-weighted penalty shootouts`;
    if (missing.length > 0) {
      infoText += ` · ⚠ Teams not found in ESPN data: ${missing.join(', ')}`;
    }
    simInfoEl.textContent = infoText;

  } catch (err) {
    document.getElementById('status').innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
    console.error(err);
  }

  isRunning = false;
  btn.disabled = false;

  // Schedule next refresh in 5 minutes
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refresh, 5 * 60 * 1000);
}

buildLegend();
refresh();
</script>
