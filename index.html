<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC 2026 Fantasy Draft Order</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script>
    // Cache-bust history-data.js so a freshly deployed file isn't masked by a stale
    // CDN/browser copy (the root cause of the grid not matching the chart in prod).
    // Bucketed to ~10 min (GitHub Pages' cache TTL) so repeat visits still hit cache.
    // document.write keeps it synchronous, so window.HISTORY_DATA is ready before app start.
    document.write('<script src="history-data.js?v=' + Math.floor(Date.now() / 600000) + '"><\/script>');
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

    header { padding: 1.25rem 2rem 1.25rem calc(2rem - 6px); border-left: 6px solid #0076B6; border-bottom: 1px solid rgba(187,185,185,0.2); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; background: #000000; }
    .header-main { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .header-icon { width: 44px; height: 44px; border-radius: 50%; background: #0076B6; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    h1 { font-size: 1.25rem; font-weight: 700; color: #ffffff; }
    #status { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.2rem; }
    .header-stats { display: flex; gap: 10px; flex-shrink: 0; }
    .stat-box { text-align: center; padding: 5px 14px; border: 1px solid rgba(187,185,185,0.2); border-radius: 6px; }
    .stat-box-value { font-size: 1.1rem; font-weight: 700; line-height: 1; color: #ffffff; }
    .stat-box-value.stat-left { color: #0076B6; }
    .stat-box-label { font-size: 0.6rem; color: #BBB9B9; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

    .controls { padding: 0.75rem 2rem; display: flex; gap: 0.75rem; align-items: center; border-bottom: 1px solid rgba(187,185,185,0.2); }
    button { background: #0076B6; color: white; border: none; padding: 0.35rem 0.9rem; border-radius: 5px; cursor: pointer; font-size: 0.8rem; transition: background 0.15s; }
    button:hover { background: #005f92; }
    button:disabled { background: #1a1a1a; color: #555; cursor: not-allowed; }
    .auto-refresh { font-size: 0.75rem; color: #888; }

    .grid-wrapper { padding: 1.25rem 2rem; overflow-x: auto; }

    table { border-collapse: separate; border-spacing: 4px 0; font-size: 0.75rem; white-space: nowrap; }

    th {
      background: #0076B6;
      padding: 0.45rem 0.6rem;
      text-align: center;
      font-weight: 600;
      color: #ffffff;
      border-top: 1px solid rgba(0,0,0,0.3);
      border-right: 1px solid rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(0,0,0,0.3);
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    th.corner {
      text-align: left;
      color: rgba(255,255,255,0.85);
      position: -webkit-sticky;
      position: sticky;
      left: 0;
      z-index: 3;
      border-left: 1px solid rgba(0,0,0,0.3);
    }

    .team-name {
      padding: 0.4rem 0.45rem;
      white-space: nowrap;
      color: #cbd5e1;
      font-weight: 500;
      background: #0a0a0a;
      position: -webkit-sticky;
      position: sticky;
      left: 0;
      z-index: 1;
      border-right: 1px solid rgba(187,185,185,0.15);
      border-bottom: 1px solid rgba(187,185,185,0.08);
    }
    tr:hover .team-name { color: #f8fafc; background: #0d0d0d; }

    .prob-cell {
      width: 80px;
      min-width: 80px;
      text-align: center;
      padding: 0.4rem 0.2rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-right: 1px solid rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(0,0,0,0.25);
      cursor: default;
      transition: filter 0.1s;
    }
    .prob-cell:hover { filter: brightness(1.25); }

    th.sortable { cursor: pointer; }
    th.sortable:hover { color: #BBB9B9; }
    th.sortable::after { content: ' ↕'; opacity: 0.35; font-size: 0.65rem; }
    th.sort-desc::after { content: ' ↓'; opacity: 1; font-size: 0.65rem; }
    th.sort-asc::after { content: ' ↑'; opacity: 1; font-size: 0.65rem; }

    .legend {
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.75rem;
      color: #666;
      border-top: 1px solid rgba(187,185,185,0.1);
      flex-wrap: wrap;
    }
    .legend-bar {
      display: flex;
      height: 10px;
      width: 180px;
      border-radius: 3px;
      overflow: hidden;
    }

    .sim-info {
      padding: 0 2rem 1.5rem;
      font-size: 0.75rem;
      color: #888;
      line-height: 1.6;
    }

    .error { color: #f87171; padding: 2rem; font-size: 0.9rem; }

    #history-section { border-top: 1px solid rgba(187,185,185,0.2); padding: 1.25rem 2rem 1.5rem; }
    .history-heading { font-size: 0.8rem; font-weight: 700; color: #BBB9B9; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.75rem; }
    .history-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1rem; }
    .htab { background: #111; color: #888; border: 1px solid rgba(187,185,185,0.15); padding: 0.2rem 0.55rem; border-radius: 4px; cursor: pointer; font-size: 0.72rem; font-weight: 600; transition: background 0.12s, color 0.12s; }
    .htab:hover { color: #e2e8f0; background: #1a1a1a; }
    .htab-active { background: #0076B6 !important; color: #fff !important; border-color: #0076B6 !important; }
    .htab-adp { margin-left: 6px; }
    #history-chart-wrap { position: relative; height: 360px; }
    #history-tooltip {
      position: absolute;
      pointer-events: none;
      background: #111;
      border: 1px solid rgba(187,185,185,0.2);
      border-radius: 6px;
      padding: 0.4rem 0.55rem;
      font-size: 0.72rem;
      color: #e2e8f0;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 10;
      white-space: nowrap;
    }
    #history-tooltip .htt-title { color: #BBB9B9; font-weight: 600; margin-bottom: 0.3rem; }
    #history-tooltip .htt-row { display: flex; align-items: center; gap: 0.4rem; line-height: 1.5; }
    #history-tooltip .htt-logo { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    #history-tooltip .htt-val { margin-left: auto; font-variant-numeric: tabular-nums; color: #fff; }
    #history-no-data { color: #555; font-size: 0.8rem; padding: 2rem 0; }
    @media (max-width: 480px) {
      #history-section { padding: 0.75rem; }
      #history-chart-wrap { height: 260px; }
    }

    #top-orders { padding: 0.75rem 2rem; border-bottom: 1px solid rgba(187,185,185,0.2); }
    .top-order-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .top-order-label { font-size: 0.75rem; font-weight: 600; color: #BBB9B9; text-transform: uppercase; letter-spacing: 0.05em; }
    .top-order-pct { font-size: 0.75rem; color: #0076B6; font-weight: 700; }
    .top-order-toggle { background: #111; color: #BBB9B9; border: 1px solid rgba(187,185,185,0.2); padding: 0.2rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .top-order-toggle:hover { background: #1a1a1a; color: #e2e8f0; }

    .top-order-row { display: flex; flex-wrap: nowrap; gap: 4px; overflow-x: auto; padding-bottom: 0.5rem; align-items: stretch; }
    .chip-spacer { flex-shrink: 0; display: flex; align-items: stretch; }
    .sim-cost { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; gap: 0.25rem; text-align: center; padding: 0.4rem 0.5rem; border-right: 1px solid rgba(187,185,185,0.08); }
    .sim-cost-label { font-size: 0.58rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
    .sim-cost-val { font-size: 1rem; font-weight: 700; color: #4ade80; font-variant-numeric: tabular-nums; line-height: 1; }
    .sim-cost-unit { font-size: 0.6rem; color: #4ade80; opacity: 0.7; }
    .sim-cost-troll { font-size: 0.6rem; color: #444; font-style: italic; line-height: 1.3; margin-top: 0.15rem; }
    .sim-cost-disclaimer { font-size: 0.6rem; color: #bbb; font-style: italic; line-height: 1.3; margin-top: 0.2rem; }
    .order-chip { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; background: #111; border: 1px solid rgba(187,185,185,0.15); border-radius: 8px; padding: 0.5rem 0.6rem; white-space: nowrap; flex-shrink: 0; width: 80px; min-width: 80px; box-sizing: border-box; }
    .order-pick-num { font-size: 0.7rem; color: #BBB9B9; font-weight: 700; }
    .order-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .order-team-name { font-size: 0.58rem; color: #cbd5e1; font-weight: 500; text-align: center; white-space: nowrap; line-height: 1.2; }
    .banner-toggle { display: flex; background: #0a0a0a; border-radius: 5px; overflow: hidden; border: 1px solid rgba(187,185,185,0.3); }
    .banner-tab { background: transparent; color: #888; border: none; padding: 0.2rem 0.65rem; font-size: 0.75rem; cursor: pointer; border-radius: 0; transition: background 0.15s, color 0.15s; }
    .banner-tab:hover { color: #BBB9B9; }
    .banner-tab-active { background: #0076B6; color: #ffffff; }
    .order-adp { font-size: 0.7rem; color: #888; font-weight: 600; }
    .order-chip-locked { background: #0f2e1a; border: 1px solid #166534; }
    .order-chip-locked .order-pick-num { color: #4ade80; }
    .order-chip-locked .order-team-name { color: #86efac; }
    .score-card { width: 100%; margin-top: 0.35rem; padding-top: 0.3rem; border-top: 1px solid rgba(187,185,185,0.15); display: flex; flex-direction: column; gap: 1px; }
    .score-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.58rem; line-height: 1.35; color: #94a3b8; }
    .score-row .sv { color: #e2e8f0; font-weight: 700; }
    .score-row.score-zero { color: #475569; }
    .score-row.score-zero .sv { color: #475569; }
    .score-row.score-goals { color: #8aa0b8; }
    .score-row.score-goals .sv { color: #cbd5e1; }
    .score-div { height: 1px; background: rgba(187,185,185,0.15); margin: 2px 0; }

    .hidden { display: none !important; }
    #dd-full { margin-top: 0.6rem; background: #050505; border: 1px solid rgba(187,185,185,0.15); border-radius: 6px; overflow: hidden; }
    .dd-header { padding: 0.4rem 0.75rem; font-size: 0.75rem; color: #888; border-bottom: 1px solid rgba(187,185,185,0.1); }
    .dd-row { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.4rem 0.75rem; border-bottom: 1px solid #0a0a0a; font-size: 0.7rem; }
    .dd-row:last-child { border-bottom: none; }
    .dd-row-top { background: #0e0e0e; }
    .dd-rank { color: #888; font-weight: 700; min-width: 2rem; flex-shrink: 0; }
    .dd-pct { color: #0076B6; font-weight: 700; min-width: 3.5rem; flex-shrink: 0; }
    .dd-teams { display: flex; flex-wrap: wrap; gap: 0.25rem 0.75rem; color: #888; }
    .dd-pick { white-space: nowrap; }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid #1a1a1a;
      border-top-color: #0076B6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stage-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      background: #111;
      color: #BBB9B9;
      margin-left: 0.5rem;
    }

    .team-name { cursor: pointer; user-select: none; }
    .team-name .toggle { display: inline-block; width: 1rem; color: #333; font-size: 0.7rem; transition: transform 0.15s; }
    .team-name.expanded .toggle { transform: rotate(90deg); color: #0076B6; }
    .team-name.expanded { color: #f8fafc; }

    .detail-row td { background: #050505; border-bottom: 1px solid rgba(187,185,185,0.1); padding: 0; }
    .detail-row.hidden { display: none; }
    .detail-inner {
      display: flex;
      gap: 1.5rem;
      padding: 0.5rem 1rem 0.5rem 1.8rem;
      flex-wrap: wrap;
    }
    .detail-team {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #888;
    }
    .detail-team-name { color: #cbd5e1; font-weight: 500; }
    .detail-stage {
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-weight: 600;
    }
    .detail-goals { font-size: 0.7rem; color: #888; }
    .flag-img { width: 20px; height: 15px; border-radius: 2px; object-fit: cover; vertical-align: middle; }
    .detail-team.eliminated .flag-img { filter: grayscale(1); opacity: 0.5; }
    .detail-team.eliminated .detail-team-name { color: #94a3b8; text-decoration: line-through; text-decoration-color: #475569; }
    .team-logo { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; vertical-align: middle; margin-right: 0.3rem; background: #111; }
    .team-logo-placeholder { display: inline-block; width: 22px; height: 22px; border-radius: 50%; background: #111; vertical-align: middle; margin-right: 0.3rem; }

    @media (max-width: 480px) {
      header { padding: 0.75rem 0.75rem 0.75rem calc(0.75rem - 6px); }
      h1 { font-size: 1rem; }
      .header-icon { width: 34px; height: 34px; font-size: 17px; }
      .stat-box { padding: 4px 10px; }
      .stat-box-value { font-size: 0.95rem; }
      .controls { padding: 0.5rem 0.75rem; flex-direction: column; align-items: stretch; }
      .controls button { width: 100%; }
      #top-orders { padding: 0.75rem 0.75rem; }
      .grid-wrapper { padding: 0.75rem 0.75rem; }
      .legend { padding: 0.75rem; }
      .legend-bar { width: 100px; }
      .sim-info { padding: 0 0.75rem 1rem; }
      .order-logo { width: 28px; height: 28px; }
      .order-chip { width: 62px; min-width: 62px; padding: 4px 5px; }
      .score-row { font-size: 0.55rem; }
      .prob-cell { width: 62px; min-width: 62px; }
      .prob-cell { width: 50px; min-width: 50px; font-size: 0.68rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-main">
      <div class="header-icon">⚽</div>
      <div>
        <h1>WC 2026 Fantasy Draft Order</h1>
        <div id="status"><span class="spinner"></span>Loading...</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-box">
        <div class="stat-box-value" id="stat-done">—</div>
        <div class="stat-box-label">Done</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-value stat-left" id="stat-left">—</div>
        <div class="stat-box-label">Left</div>
      </div>
    </div>
  </header>
  <div class="controls">
    <button id="refresh-btn" onclick="refresh()" disabled>↻ Refresh</button>
    <span class="auto-refresh">Auto-refreshes every 5 min</span>
  </div>
  <div id="top-orders"></div>

  <div id="history-section">
    <div class="history-heading">Draft Pick Probability Over Time</div>
    <div class="history-tabs" id="history-tabs"></div>
    <div id="history-chart-wrap">
      <div id="history-no-data">Run <code>node generate-history.js</code> to generate history-data.json</div>
      <canvas id="history-chart" style="display:none"></canvas>
      <div id="history-tooltip"></div>
    </div>
  </div>

  <div class="grid-wrapper">
    <table id="grid"></table>
  </div>
  <div class="legend">
    <span>0%</span>
    <div class="legend-bar" id="legend-bar"></div>
    <span>High %</span>
    <span style="margin-left:1rem;color:#888">· Darker = lower probability · Brighter = higher probability</span>
  </div>
  <div class="sim-info" id="sim-info"></div>

<script>
// ─── FLAG & LOGO ASSETS ─────────────────────────────────────────────────────
const FLAG_CODE = {
  'Iran':                 'ir',
  'Egypt':                'eg',
  'Saudi Arabia':         'sa',
  'Colombia':             'co',
  'New Zealand':          'nz',
  'Norway':               'no',
  'Canada':               'ca',
  'Sweden':               'se',
  'England':              'gb-eng',
  'Spain':                'es',
  'Türkiye':              'tr',
  'Haiti':                'ht',
  'Portugal':             'pt',
  'Ghana':                'gh',
  'Germany':              'de',
  'Ivory Coast':          'ci',
  'Netherlands':          'nl',
  'USA':                  'us',
  'South Korea':          'kr',
  'Iraq':                 'iq',
  'Tunisia':              'tn',
  'Qatar':                'qa',
  'Senegal':              'sn',
  'Austria':              'at',
  'Jordan':               'jo',
  'Switzerland':          'ch',
  'Australia':            'au',
  'Belgium':              'be',
  'Czechia':              'cz',
  'DR Congo':             'cd',
  'Uzbekistan':           'uz',
  'Bosnia & Herzegovina': 'ba',
  'France':               'fr',
  'South Africa':         'za',
  'Scotland':             'gb-sct',
  'Curaçao':              'cw',
  'Ecuador':              'ec',
  'Mexico':               'mx',
  'Uruguay':              'uy',
  'Argentina':            'ar',
  'Algeria':              'dz',
  'Brazil':               'br',
  'Panama':               'pa',
  'Cabo Verde':           'cv',
  'Japan':                'jp',
  'Morocco':              'ma',
  'Croatia':              'hr',
  'Paraguay':             'py',
};

function flagUrl(country) {
  const code = FLAG_CODE[country];
  return code ? `https://flagcdn.com/w40/${code}.png` : null;
}

function flagImg(country) {
  const url = flagUrl(country);
  return url ? `<img class="flag-img" src="${url}" alt="${country}" title="${country}">` : '';
}

function teamLogoImg(fantasyTeam) {
  const src = `assets/teams/${encodeURIComponent(fantasyTeam)}.png`;
  return `<img class="team-logo" src="${src}" alt="${fantasyTeam}" onerror="this.style.display='none';this.nextSibling.style.display='inline-block'"><span class="team-logo-placeholder" style="display:none"></span>`;
}

// ─── FANTASY TEAM ALLOCATIONS ───────────────────────────────────────────────
const FANTASY_TEAMS = {
  'Kurlewis':      ['Iran', 'Egypt', 'Saudi Arabia'],
  'Seamen':        ['Colombia', 'New Zealand', 'Norway'],
  'A&T':           ['Canada', 'Sweden', 'England'],
  'Barons':        ['Spain', 'Türkiye', 'Haiti'],
  'SDs':           ['Portugal', 'Ghana', 'Germany'],
  'Dirty Birds':   ['Ivory Coast', 'Netherlands', 'USA'],
  'Aligators':     ['South Korea', 'Iraq', 'Tunisia'],
  'Dynamics':      ['Qatar', 'Senegal', 'Austria'],
  'SERPION':       ['Jordan', 'Switzerland', 'Australia'],
  'Fishies':       ['Belgium', 'Czechia', 'DR Congo'],
  'Piggies':       ['Uzbekistan', 'Bosnia & Herzegovina', 'France'],
  'Puffins':       ['South Africa', 'Scotland', 'Curaçao'],
  'Ester':         ['Ecuador', 'Mexico', 'Uruguay'],
  'Puddings':      ['Argentina', 'Algeria', 'Brazil'],
  'Leeanacondas':  ['Panama', 'Cabo Verde', 'Japan'],
  'Pat':           ['Morocco', 'Croatia', 'Paraguay'],
};

// ─── TEAM STRENGTHS (FIFA ranking points, approx. June 2026) ────────────────
const TEAM_STRENGTH = {
  'Argentina':            1877,
  'Spain':                1875,
  'France':               1871,
  'England':              1828,
  'Portugal':             1768,
  'Brazil':               1766,
  'Netherlands':          1740,
  'Belgium':              1725,
  'Germany':              1715,
  'Croatia':              1700,
  'Italy':                1685,
  'Uruguay':              1670,
  'Colombia':             1655,
  'Morocco':              1640,
  'USA':                  1625,
  'Mexico':               1610,
  'Japan':                1600,
  'Switzerland':          1590,
  'Senegal':              1580,
  'Iran':                 1570,
  'South Korea':          1560,
  'Ecuador':              1550,
  'Australia':            1535,
  'Austria':              1525,
  'Türkiye':              1515,
  'Denmark':              1505,
  'Norway':               1500,
  'Canada':               1490,
  'Sweden':               1515,
  'Ivory Coast':          1533,
  'Ghana':                1485,
  'Paraguay':             1503,
  'Algeria':              1470,
  'Tunisia':              1483,
  'Panama':               1541,
  'Qatar':                1450,
  'Egypt':                1460,
  'Saudi Arabia':         1445,
  'Scotland':             1498,
  'South Africa':         1430,
  'DR Congo':             1478,
  'Bosnia & Herzegovina': 1465,
  'Czechia':              1501,
  'Uzbekistan':           1440,
  'Jordan':               1430,
  'Iraq':                 1420,
  'New Zealand':          1410,
  'Cabo Verde':           1395,
  'Curaçao':              1350,
  'Haiti':                1340,
};

const AVG_STRENGTH = Object.values(TEAM_STRENGTH).reduce((a, b) => a + b, 0) / Object.values(TEAM_STRENGTH).length;

function getStrength(team) {
  return TEAM_STRENGTH[team] || AVG_STRENGTH;
}

// Lambda for Poisson goal model scaled by team strength.
// Squared ratio amplifies the gap between strong and weak teams —
// linear scaling was too compressed (Spain vs Cabo Verde looked nearly even).
function goalLambda(team) {
  const ratio = getStrength(team) / AVG_STRENGTH;
  return Math.max(0.3, Math.min(4.0, 1.3 * ratio * ratio * ratio * ratio));
}

// ESPN display name → canonical name used above
const ESPN_NORMALIZE = {
  'United States':        'USA',
  'Bosnia-Herzegovina':   'Bosnia & Herzegovina',
  "Côte d'Ivoire":        'Ivory Coast',
  'Korea Republic':       'South Korea',
  'Republic of Korea':    'South Korea',
  'Congo DR':             'DR Congo',
  'Cape Verde':           'Cabo Verde',
  'Cabo Verde':           'Cabo Verde',
  'Curacao':              'Curaçao',
  'Turkey':               'Türkiye',
  'Czech Republic':       'Czechia',
  'New Zealand':          'New Zealand',
  'DR Congo':             'DR Congo',
};

function normalize(name) {
  return ESPN_NORMALIZE[name] || name;
}

// ─── SEEDED PRNG (mulberry32) ────────────────────────────────────────────────
let _rngState = 1;
function seedRng(seed) {
  _rngState = seed >>> 0 || 1;
}
function rng() {
  _rngState |= 0;
  _rngState = _rngState + 0x6D2B79F5 | 0;
  let t = Math.imul(_rngState ^ _rngState >>> 15, 1 | _rngState);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

// ─── STAGE ENUM ─────────────────────────────────────────────────────────────
const STAGE = {
  GROUP_ELIMINATED: 0,
  R32_ELIMINATED:   1,
  R16_ELIMINATED:   2,
  QF_ELIMINATED:    3,
  SF_LOST_3RD:      4,
  SF_WON_3RD:       5,
  RUNNER_UP:        6,
  WINNER:           7,
};

const STAGE_LABEL = {
  0: 'Group Out',
  1: 'R32 Out',
  2: 'R16 Out',
  3: 'QF Out',
  4: '4th Place',
  5: '3rd Place',
  6: 'Runner-up',
  7: 'Winner',
};

// ─── ROUND DETECTION ────────────────────────────────────────────────────────
function parseRound(event) {
  const note = (event.competitions[0]?.altGameNote || '').toLowerCase();
  const date = event.date.substring(0, 10);

  if (note.includes('group'))                                     return 'GROUP';
  if (note.includes('round of 32'))                              return 'R32';
  if (note.includes('round of 16') || note.includes('rd of 16')) return 'R16';
  if (note.includes('quarterfinal') || note.includes('quarter')) return 'QF';
  if (note.includes('third') || note.includes('3rd'))            return 'THIRD';
  if (note.includes('semifinal') || note.includes('semi'))       return 'SF';
  if (note.includes('final'))                                     return 'FINAL';

  // Date-based fallback
  if (date >= '2026-07-19') return 'FINAL';
  if (date >= '2026-07-18') return 'THIRD';
  if (date >= '2026-07-14') return 'SF';
  if (date >= '2026-07-09') return 'QF';
  if (date >= '2026-07-04') return 'R16';
  if (date >= '2026-06-28') return 'R32';
  return 'GROUP';
}

// ─── DATA FETCHING ───────────────────────────────────────────────────────────
async function fetchAllGames() {
  const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200';
  const res = await fetch(url);
  if (!res.ok) throw new Error(`ESPN API ${res.status}`);
  const data = await res.json();
  return data.events || [];
}

// ─── STATE PARSING ───────────────────────────────────────────────────────────
function parseTournamentState(events) {
  const groupStandings = {};   // group → { team → { pts, gf, ga, gp } }
  const groupTeams = {};       // group → Set of team names
  const groupGames = [];       // all group-stage game objects
  const allTeamStats = {};     // team → { gf, ga } (real stats from completed games)
  const knockoutEliminated = {};  // team → STAGE value (for completed knockout)
  const knockoutAlive = new Set(); // teams known to have won a knockout game
  const r32Actual = [], koResults = []; // real R32 matchups + completed KO results

  function statsOf(name) {
    if (!allTeamStats[name]) allTeamStats[name] = { gf: 0, ga: 0 };
    return allTeamStats[name];
  }

  for (const event of events) {
    const round = parseRound(event);
    const comp = event.competitions[0];
    if (!comp || comp.competitors.length < 2) continue;

    const c0 = comp.competitors[0], c1 = comp.competitors[1];
    const home = normalize(c0.team.displayName);
    const away = normalize(c1.team.displayName);
    const done = comp.status.type.completed;
    const hg = done ? parseInt(c0.score || '0') : null;
    const ag = done ? parseInt(c1.score || '0') : null;
    const homeWin = done ? !!c0.winner : null;
    const awayWin = done ? !!c1.winner : null;

    if (round === 'GROUP') {
      const m = (comp.altGameNote || '').match(/Group ([A-L])/i);
      const group = m ? m[1].toUpperCase() : null;

      if (group) {
        if (!groupTeams[group]) groupTeams[group] = new Set();
        groupTeams[group].add(home);
        groupTeams[group].add(away);

        if (!groupStandings[group]) groupStandings[group] = {};
        const gs = groupStandings[group];
        if (!gs[home]) gs[home] = { pts: 0, gf: 0, ga: 0, gp: 0 };
        if (!gs[away]) gs[away] = { pts: 0, gf: 0, ga: 0, gp: 0 };

        if (done && hg !== null) {
          gs[home].gp++; gs[away].gp++;
          gs[home].gf += hg; gs[home].ga += ag;
          gs[away].gf += ag; gs[away].ga += hg;
          if (homeWin)       { gs[home].pts += 3; }
          else if (awayWin)  { gs[away].pts += 3; }
          else               { gs[home].pts += 1; gs[away].pts += 1; }

          statsOf(home).gf += hg; statsOf(home).ga += ag;
          statsOf(away).gf += ag; statsOf(away).ga += hg;
        }
      }
      groupGames.push({ home, away, hg, ag, homeWin, awayWin, done, group });

    } else {
      // Knockout
      // Capture real R32 matchups (resolved once groups finish) for true seeding.
      if (round === 'R32' && TEAM_STRENGTH[home] && TEAM_STRENGTH[away]) r32Actual.push([home, away]);
      if (done && hg !== null) {
        statsOf(home).gf += hg; statsOf(home).ga += ag;
        statsOf(away).gf += ag; statsOf(away).ga += hg;

        const loser  = homeWin ? away : (awayWin ? home : null);
        const winner = homeWin ? home : (awayWin ? away : null);
        if (winner) koResults.push({ a: home, b: away, winner });

        if (round === 'FINAL') {
          if (loser)  knockoutEliminated[loser]  = STAGE.RUNNER_UP;
          if (winner) knockoutEliminated[winner] = STAGE.WINNER;
        } else if (round === 'THIRD') {
          if (loser)  knockoutEliminated[loser]  = STAGE.SF_LOST_3RD;
          if (winner) knockoutEliminated[winner] = STAGE.SF_WON_3RD;
        } else {
          const stageMap = { R32: STAGE.R32_ELIMINATED, R16: STAGE.R16_ELIMINATED, QF: STAGE.QF_ELIMINATED, SF: STAGE.SF_LOST_3RD };
          if (loser) knockoutEliminated[loser] = stageMap[round] ?? STAGE.R32_ELIMINATED;
          if (winner && round !== 'SF') knockoutAlive.add(winner);
        }
      }
    }
  }

  const completedCount = events.filter(e => e.competitions[0]?.status?.type?.completed).length;
  const groupsComplete = Object.keys(groupTeams).length === 12 &&
    Object.entries(groupTeams).every(([g, set]) =>
      set.size === 4 && [...set].every(t => (groupStandings[g]?.[t]?.gp ?? 0) >= 3));
  return { groupStandings, groupTeams, groupGames, allTeamStats, knockoutEliminated, knockoutAlive,
           completedCount, r32Actual, koResults, groupsComplete };
}

// ─── SIMULATION ENGINE ───────────────────────────────────────────────────────
function poisson(lambda) {
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= rng(); } while (p > L);
  return k - 1;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sortGroup(teams, standings) {
  return [...teams].sort((a, b) => {
    const sa = standings[a] || { pts: 0, gf: 0, ga: 0, gp: 0 };
    const sb = standings[b] || { pts: 0, gf: 0, ga: 0, gp: 0 };
    if (sb.pts !== sa.pts) return sb.pts - sa.pts;
    const gdB = sb.gf - sb.ga, gdA = sa.gf - sa.ga;
    if (gdB !== gdA) return gdB - gdA;
    if (sb.gf !== sa.gf) return sb.gf - sa.gf;
    return rng() - 0.5;
  });
}

// ─── KNOCKOUT BRACKET (FIFA 2026, canonical match numbers 73–104) ───────────────
// Verified against ESPN matchNumber + the official bracket. Each R32 slot is either
// a group position [groupLetter, pos] (pos 0 = winner, 1 = runner-up) or a
// third-place berth { t: [eligible group letters] }. Later rounds reference the
// two feeder match numbers whose winners advance. This is the path-dependency core:
// teams flow through a FIXED tree instead of being re-shuffled each round.
const GROUP_LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
const R32_SLOTS = {
  73: [['A',1],['B',1]],            74: [['E',0],{t:['A','B','C','D','F']}],
  75: [['F',0],['C',1]],            76: [['C',0],['F',1]],
  77: [['I',0],{t:['C','D','F','G','H']}], 78: [['E',1],['I',1]],
  79: [['A',0],{t:['C','E','F','H','I']}], 80: [['L',0],{t:['E','H','I','J','K']}],
  81: [['D',0],{t:['B','E','F','I','J']}], 82: [['G',0],{t:['A','E','H','I','J']}],
  83: [['K',1],['L',1]],            84: [['H',0],['J',1]],
  85: [['B',0],{t:['E','F','G','I','J']}], 86: [['J',0],['H',1]],
  87: [['K',0],{t:['D','E','I','J','L']}], 88: [['D',1],['G',1]],
};
const THIRD_BERTHS = [74,77,79,80,81,82,85,87]; // R32 matches hosting a third-placed team
const FEEDERS = {
  89:[74,77], 90:[73,75], 91:[76,78], 92:[79,80], 93:[83,84], 94:[81,82], 95:[86,88], 96:[85,87],
  97:[89,90], 98:[93,94], 99:[91,92], 100:[95,96], 101:[97,98], 102:[99,100],
};
const SF_MATCHES = [101,102], FINAL_MATCH = 104, THIRD_PLACE_MATCH = 103;
function range(a, b) { const r = []; for (let i = a; i <= b; i++) r.push(i); return r; }

// Assign the 8 qualifying third-placed teams to the 8 berths, respecting each
// berth's eligible-group set (no group-stage rematch). Bipartite matching with
// randomized order via augmenting paths; any valid perfect matching is fine.
function matchThirds(thirds) {
  const berths = THIRD_BERTHS.map(m => ({ m, set: R32_SLOTS[m][1].t }));
  const order = shuffle(berths.map((_, i) => i));
  const berthThird = new Array(berths.length).fill(-1); // berth idx -> third idx
  function augment(bi, seen) {
    for (let ti = 0; ti < thirds.length; ti++) {
      if (seen[ti] || !berths[bi].set.includes(thirds[ti].group)) continue;
      seen[ti] = true;
      const cur = berthThird.indexOf(ti);
      if (cur === -1 || augment(cur, seen)) { berthThird[bi] = ti; return true; }
    }
    return false;
  }
  for (const bi of order) augment(bi, new Array(thirds.length).fill(false));
  const assign = {};
  berths.forEach((b, i) => { if (berthThird[i] !== -1) assign[b.m] = thirds[berthThird[i]].team; });
  const usedThirds = new Set(berthThird.filter(x => x !== -1).map(i => thirds[i].team));
  const openBerths = berths.filter(b => !assign[b.m]).map(b => b.m);
  thirds.filter(t => !usedThirds.has(t.team)).forEach((t, i) => { if (openBerths[i]) assign[openBerths[i]] = t.team; });
  return assign;
}

// Walk the fixed bracket. `seeded` maps each R32 match (73–88) to [team0, team1].
// `knownWinner` maps a sorted "teamA::teamB" key to the actual winner for already
// completed knockout games (those goals are already in base stats, so we don't
// re-add them). Returns stage assignments for every knockout team.
function simulateBracket(seeded, statsOf, knownWinner) {
  const stage = {}, winner = {}, loser = {};
  const key = (a, b) => [a, b].sort().join('::');
  function play(m, t1, t2) {
    const known = knownWinner[key(t1, t2)];
    if (known) { winner[m] = known; loser[m] = known === t1 ? t2 : t1; return; }
    const hg = poisson(goalLambda(t1)), ag = poisson(goalLambda(t2));
    const s1 = getStrength(t1), s2 = getStrength(t2);
    const t1wins = hg > ag || (hg === ag && rng() < s1 / (s1 + s2));
    winner[m] = t1wins ? t1 : t2; loser[m] = t1wins ? t2 : t1;
    statsOf(t1).gf += hg; statsOf(t1).ga += ag;
    statsOf(t2).gf += ag; statsOf(t2).ga += hg;
  }
  const ROUND_STAGE = [
    { matches: range(73, 88), elim: STAGE.R32_ELIMINATED },
    { matches: range(89, 96), elim: STAGE.R16_ELIMINATED },
    { matches: range(97, 100), elim: STAGE.QF_ELIMINATED },
  ];
  for (const m of range(73, 88)) play(m, seeded[m][0], seeded[m][1]);
  for (const m of range(89, 100)) play(m, winner[FEEDERS[m][0]], winner[FEEDERS[m][1]]);
  for (const { matches, elim } of ROUND_STAGE) for (const m of matches) stage[loser[m]] = elim;
  for (const m of SF_MATCHES) play(m, winner[FEEDERS[m][0]], winner[FEEDERS[m][1]]);
  play(THIRD_PLACE_MATCH, loser[SF_MATCHES[0]], loser[SF_MATCHES[1]]);
  stage[winner[THIRD_PLACE_MATCH]] = STAGE.SF_WON_3RD;
  stage[loser[THIRD_PLACE_MATCH]] = STAGE.SF_LOST_3RD;
  play(FINAL_MATCH, winner[SF_MATCHES[0]], winner[SF_MATCHES[1]]);
  stage[winner[FINAL_MATCH]] = STAGE.WINNER;
  stage[loser[FINAL_MATCH]] = STAGE.RUNNER_UP;
  return stage;
}

function runOneSimulation(state) {
  const { groupStandings: baseSt, groupTeams, groupGames, allTeamStats, knockoutEliminated, knockoutAlive } = state;

  // Clone group standings
  const st = {};
  for (const [g, teams] of Object.entries(baseSt)) {
    st[g] = {};
    for (const [t, s] of Object.entries(teams)) st[g][t] = { ...s };
  }

  // Clone team stats
  const stats = {};
  for (const [t, s] of Object.entries(allTeamStats)) stats[t] = { ...s };
  function statsOf(t) { if (!stats[t]) stats[t] = { gf: 0, ga: 0 }; return stats[t]; }

  // Simulate remaining group games
  for (const g of groupGames) {
    if (g.done || !g.group) continue;
    const hg = poisson(goalLambda(g.home)), ag = poisson(goalLambda(g.away));
    if (!st[g.group]) st[g.group] = {};
    const gs = st[g.group];
    if (!gs[g.home]) gs[g.home] = { pts: 0, gf: 0, ga: 0, gp: 0 };
    if (!gs[g.away]) gs[g.away] = { pts: 0, gf: 0, ga: 0, gp: 0 };
    gs[g.home].gp++; gs[g.away].gp++;
    gs[g.home].gf += hg; gs[g.home].ga += ag;
    gs[g.away].gf += ag; gs[g.away].ga += hg;
    if (hg > ag)      { gs[g.home].pts += 3; }
    else if (ag > hg) { gs[g.away].pts += 3; }
    else              { gs[g.home].pts += 1; gs[g.away].pts += 1; }
    statsOf(g.home).gf += hg; statsOf(g.home).ga += ag;
    statsOf(g.away).gf += ag; statsOf(g.away).ga += hg;
  }

  // ── Final group standings, qualifiers, and eliminated teams ──
  const stage = {};
  const sorted = {};   // group letter -> [1st, 2nd, 3rd, 4th]
  const thirds = [];   // { team, group, pts, gd, gf }
  for (const g of GROUP_LETTERS) {
    const teamSet = groupTeams[g];
    if (!teamSet) continue;
    const ranked = sortGroup([...teamSet], st[g] || {});
    sorted[g] = ranked;
    if (ranked[3]) stage[ranked[3]] = STAGE.GROUP_ELIMINATED;
    if (ranked[2]) {
      const s = (st[g] || {})[ranked[2]] || { pts: 0, gf: 0, ga: 0 };
      thirds.push({ team: ranked[2], group: g, pts: s.pts, gd: s.gf - s.ga, gf: s.gf });
    }
  }
  thirds.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || rng() - 0.5);
  const top8 = thirds.slice(0, 8);
  for (const t of thirds.slice(8)) stage[t.team] = STAGE.GROUP_ELIMINATED; // non-qualifying thirds

  // ── Seed the Round of 32 into the fixed bracket ──
  const seeded = {};
  for (const m of range(73, 88)) {
    seeded[m] = R32_SLOTS[m].map(slot => Array.isArray(slot) ? sorted[slot[0]]?.[slot[1]] : null);
  }
  let thirdAssign = null;
  if (state.groupsComplete && state.r32Actual?.length) {
    // Regime 2: groups final — use the real third-place allocation from ESPN.
    const host = {};
    for (const m of THIRD_BERTHS) { const [g, pos] = R32_SLOTS[m][0]; host[sorted[g]?.[pos]] = m; }
    const a = {};
    for (const [x, y] of state.r32Actual) {
      if (host[x] !== undefined) a[host[x]] = y; else if (host[y] !== undefined) a[host[y]] = x;
    }
    if (THIRD_BERTHS.every(m => a[m])) thirdAssign = a;
  }
  if (!thirdAssign) thirdAssign = matchThirds(top8); // Regime 1: constrained matching
  for (const m of THIRD_BERTHS) seeded[m][1] = thirdAssign[m];

  // ── Already-played knockout games override simulation (goals already in stats) ──
  const knownWinner = {};
  for (const r of (state.koResults || [])) knownWinner[[r.a, r.b].sort().join('::')] = r.winner;

  // ── Walk the fixed bracket (path-dependent) ──
  Object.assign(stage, simulateBracket(seeded, statsOf, knownWinner));

  return { stage, stats };
}

function rankFantasyTeams(stage, stats) {
  return Object.keys(FANTASY_TEAMS)
    .map(team => {
      const wcTeams = FANTASY_TEAMS[team];
      const stages = wcTeams.map(t => stage[t] ?? STAGE.GROUP_ELIMINATED).sort((a, b) => b - a);
      const totalGF = wcTeams.reduce((s, t) => s + (stats[t]?.gf || 0), 0);
      const totalGA = wcTeams.reduce((s, t) => s + (stats[t]?.ga || 0), 0);
      return { team, stages, totalGF, totalGA };
    })
    .sort((a, b) => {
      for (let i = 0; i < 3; i++) {
        const diff = (b.stages[i] ?? 0) - (a.stages[i] ?? 0);
        if (diff !== 0) return diff;
      }
      if (b.totalGF !== a.totalGF) return b.totalGF - a.totalGF;
      if (a.totalGA !== b.totalGA) return a.totalGA - b.totalGA;
      return rng() - 0.5; // coin flip
    })
    .map(s => s.team);
}

function runMonteCarlo(state, N = 10000) {
  // Fixed seed (NOT tied to results): the only thing that should move the numbers
  // between snapshots is new match results, never Monte Carlo resampling noise.
  // Must match the constant in generate-history.js so the grid reconciles with the chart.
  seedRng(20260611);
  const teams = Object.keys(FANTASY_TEAMS);
  const counts = {};
  for (const t of teams) counts[t] = new Array(16).fill(0);
  const orderCounts = {};

  for (let i = 0; i < N; i++) {
    const { stage, stats } = runOneSimulation(state);
    const ranked = rankFantasyTeams(stage, stats);
    ranked.forEach((team, idx) => counts[team][idx]++);
    const key = ranked.join('|');
    orderCounts[key] = (orderCounts[key] || 0) + 1;
  }

  const probs = {};
  const adp = {};
  for (const t of teams) {
    probs[t] = counts[t].map(c => (c / N) * 100);
    adp[t] = counts[t].reduce((sum, c, i) => sum + c * (i + 1), 0) / N;
  }

  // Most common full draft orders. Ties (equal frequency) are broken by smallest
  // total absolute deviation from ADP — the ordering closest to expectation ranks first.
  const deviation = order => order.reduce((sum, t, i) => sum + Math.abs((i + 1) - adp[t]), 0);
  const topOrders = Object.entries(orderCounts)
    .map(([key, cnt]) => ({ order: key.split('|'), cnt }))
    .sort((a, b) => b.cnt - a.cnt || deviation(a.order) - deviation(b.order))
    .slice(0, 10)
    .map(({ order, cnt }) => ({ order, pct: (cnt / N) * 100 }));

  return { probs, topOrders, adp };
}

// ─── CURRENT BEST ESTIMATE (deterministic) ──────────────────────────────────
function getBestEstimate(state) {
  // Use current known results, treat all unknowns as "alive" at group level
  const { groupStandings, groupTeams, allTeamStats, knockoutEliminated } = state;
  const stage = { ...knockoutEliminated };

  // For group stage, mark clearly eliminated teams (mathematically out)
  for (const [group, teamSet] of Object.entries(groupTeams)) {
    const sorted = sortGroup([...teamSet], groupStandings[group] || {});
    // Only mark 4th place if all games in group are played
    const gs = groupStandings[group] || {};
    const allPlayed = [...teamSet].every(t => (gs[t]?.gp ?? 0) >= 3);
    if (allPlayed) {
      if (sorted[3] && !stage[sorted[3]]) stage[sorted[3]] = STAGE.GROUP_ELIMINATED;
    }
  }

  // Score fantasy teams on current known results
  return Object.keys(FANTASY_TEAMS).map(team => {
    const wcTeams = FANTASY_TEAMS[team];
    const stages = wcTeams.map(t => stage[t] ?? STAGE.GROUP_ELIMINATED).sort((a, b) => b - a);
    const totalGF = wcTeams.reduce((s, t) => s + (allTeamStats[t]?.gf || 0), 0);
    const totalGA = wcTeams.reduce((s, t) => s + (allTeamStats[t]?.ga || 0), 0);
    return { team, stages, totalGF, totalGA };
  });
}

// ─── HEAT MAP COLOR ─────────────────────────────────────────────────────────
function heatColor(pct) {
  // 0% → near-black, high% → Detroit Lions blue (#0076B6)
  const t = Math.min(pct / 40, 1); // saturate at 40%
  const r = Math.round(5  + t * (0   - 5));
  const g = Math.round(5  + t * (118 - 5));
  const b = Math.round(15 + t * (182 - 15));
  const textOpacity = pct < 0.5 ? 0.25 : (0.4 + t * 0.6);
  return {
    bg: `rgb(${r},${g},${b})`,
    text: `rgba(255,255,255,${textOpacity})`
  };
}

// ─── TOP ORDERS RENDER ───────────────────────────────────────────────────────
const LOCK_THRESHOLD = 99; // % — position is considered locked in

// Scorecard rows in display order, each mapped to the STAGE enum value that counts
// toward it. Only teams with a FINALISED placement are counted — a team that is
// still alive (no settled stage) contributes to no bucket until it's eliminated or
// wins the tournament. (There's no 'SF' row: semifinal losers always finish 3rd or
// 4th via the third-place match, so it would be redundant.)
const SCORE_STAGES = [
  ['1st', STAGE.WINNER], ['2nd', STAGE.RUNNER_UP], ['3rd', STAGE.SF_WON_3RD], ['4th', STAGE.SF_LOST_3RD],
  ['QF', STAGE.QF_ELIMINATED], ['R16', STAGE.R16_ELIMINATED], ['R32', STAGE.R32_ELIMINATED],
  ['G', STAGE.GROUP_ELIMINATED],
];

// Live (not simulated) scorecard for one fantasy team: how many of its 3 WC teams
// have finalised at each stage, plus cumulative goals for / against.
function teamScorecard(team, state, wcTeamStage) {
  const byStage = {}; // STAGE value -> count of this team's WC teams settled there
  let gf = 0, ga = 0;
  for (const wc of FANTASY_TEAMS[team]) {
    const s = wcTeamStage[wc];
    if (s !== undefined) byStage[s] = (byStage[s] || 0) + 1;
    gf += state.allTeamStats[wc]?.gf || 0;
    ga += state.allTeamStats[wc]?.ga || 0;
  }
  return { byStage, gf, ga };
}

function scorecardHtml(team) {
  if (!lastState) return '';
  const wcTeamStage = lastWcTeamStage || computeWcTeamStage(lastState);
  const { byStage, gf, ga } = teamScorecard(team, lastState, wcTeamStage);
  const rows = SCORE_STAGES.map(([label, stage]) => {
    const n = byStage[stage] || 0;
    return `<div class="score-row${n === 0 ? ' score-zero' : ''}"><span>${label}</span><span class="sv">${n === 0 ? '-' : n}</span></div>`;
  }).join('');
  return `<div class="score-card">
    ${rows}
    <div class="score-div"></div>
    <div class="score-row score-goals"><span>GF</span><span class="sv">${gf}</span></div>
    <div class="score-row score-goals"><span>GA</span><span class="sv">${ga}</span></div>
  </div>`;
}

function renderTopOrders(topOrders, probs, adp) {
  if (!topOrders || !adp) return;

  const isAdp = orderBannerMode === 'adp';

  let chips;
  if (isAdp) {
    const sorted = Object.keys(adp).sort((a, b) => adp[a] - adp[b]);
    chips = sorted.map((team) => {
      const src = `assets/teams/${encodeURIComponent(team)}.png`;
      return `<div class="order-chip">
        <span class="order-pick-num">${adp[team].toFixed(1)}</span>
        <img class="order-logo" src="${src}" alt="${team}" onerror="this.style.display='none'">
        <span class="order-team-name">${team}</span>
        ${scorecardHtml(team)}
      </div>`;
    }).join('');
  } else {
    const best = topOrders[0];
    chips = best.order.map((team, i) => {
      const src = `assets/teams/${encodeURIComponent(team)}.png`;
      const locked = probs && (probs[team]?.[i] ?? 0) >= LOCK_THRESHOLD;
      return `<div class="order-chip ${locked ? 'order-chip-locked' : ''}">
        <span class="order-pick-num">${i + 1}</span>
        <img class="order-logo" src="${src}" alt="${team}" onerror="this.style.display='none'">
        <span class="order-team-name">${team}</span>
        ${scorecardHtml(team)}
      </div>`;
    }).join('');
  }

  const total = topOrders.reduce((s, o) => s + o.pct, 0).toFixed(1);
  const rows = topOrders.map((o, i) => {
    const picks = o.order.map((t, j) => `<span class="dd-pick">${j + 1}. ${t}</span>`).join('');
    return `<div class="dd-row ${i === 0 ? 'dd-row-top' : ''}">
      <span class="dd-rank">#${i + 1}</span>
      <span class="dd-pct">${o.pct.toFixed(2)}%</span>
      <div class="dd-teams">${picks}</div>
    </div>`;
  }).join('');

  document.getElementById('top-orders').innerHTML = `
    <div class="top-order-header">
      <span class="top-order-label">${isAdp ? 'Average Draft Position' : 'Most Common Draft Order'}</span>
      <div class="banner-toggle">
        <button class="banner-tab ${isAdp ? 'banner-tab-active' : ''}" onclick="orderBannerMode='adp'; currentSortCol=null; currentSortDir=null; renderTopOrders(lastTopOrders, lastProbs, lastAdp); if(lastProbs) renderGrid(lastProbs, lastEstimate, lastState, currentSortCol); syncChipSpacer()">Avg Position</button>
        <button class="banner-tab ${!isAdp ? 'banner-tab-active' : ''}" onclick="orderBannerMode='likely'; currentSortCol=null; currentSortDir=null; renderTopOrders(lastTopOrders, lastProbs, lastAdp); if(lastProbs) renderGrid(lastProbs, lastEstimate, lastState, currentSortCol); syncChipSpacer()">Most Common</button>
      </div>
      ${!isAdp ? `<span class="top-order-pct">${topOrders[0].pct.toFixed(2)}%</span><button class="top-order-toggle" onclick="document.getElementById('dd-full').classList.toggle('hidden')">Top 10 ▾</button>` : ''}
    </div>
    <div class="top-order-row" id="chip-row">
      <div class="chip-spacer" id="chip-spacer"><div class="sim-cost" id="sim-cost"></div></div>
      ${chips}
    </div>
    ${!isAdp ? `<div id="dd-full" class="hidden">
      <div class="dd-header">Top 10 most likely orderings · combined probability: <strong>${total}%</strong></div>
      ${rows}
    </div>` : ''}
  `;
  renderSimCost();
}

const STAGE_STYLE = {
  0: { bg: '#2a1212', color: '#f87171', label: 'Group Out' },
  1: { bg: '#2a1e10', color: '#fb923c', label: 'R32 Out' },
  2: { bg: '#2a2710', color: '#fbbf24', label: 'R16 Out' },
  3: { bg: '#162810', color: '#86efac', label: 'QF Out' },
  4: { bg: '#0f2a1e', color: '#34d399', label: '4th Place' },
  5: { bg: '#0f2a1e', color: '#34d399', label: '3rd Place' },
  6: { bg: '#0f1f2a', color: '#60a5fa', label: 'Runner-up' },
  7: { bg: '#2a2410', color: '#fcd34d', label: 'Winner' },
};

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// Overall finish-rank (1 = best) for every WC team given the current results.
// Knockout/finished teams rank above all group-stage teams; within the group tier
// teams are ordered by points, then goal difference, then goals scored. Eliminated
// teams read their rank off this table; it refines as more results come in.
function computeFinalRanks(state, wcTeamStage) {
  const teams = new Set();
  for (const set of Object.values(state.groupTeams)) for (const t of set) teams.add(t);
  const gpts = {};
  for (const st of Object.values(state.groupStandings)) for (const [t, s] of Object.entries(st)) gpts[t] = s.pts;
  // Finishing position within the group (0 = 1st … 3 = 4th). Within the group tier
  // this is the primary key, so every 3rd-place team outranks every 4th-place team.
  const groupPos = {};
  for (const [g, teamSet] of Object.entries(state.groupTeams)) {
    sortGroup([...teamSet], state.groupStandings[g] || {}).forEach((t, i) => { groupPos[t] = i; });
  }
  const alive = state.knockoutAlive || new Set();
  const tierOf = t => {
    if (wcTeamStage[t] !== undefined) return wcTeamStage[t]; // 0 group-out … 7 winner
    if (alive.has && alive.has(t)) return 1.5;               // won a KO game, still alive
    return 0;                                                // alive, still group stage
  };
  const arr = [...teams].map(t => {
    const s = state.allTeamStats[t] || { gf: 0, ga: 0 };
    return { t, tier: tierOf(t), pos: groupPos[t] ?? 3, pts: gpts[t] ?? 0, gd: s.gf - s.ga, gf: s.gf, ga: s.ga };
  });
  arr.sort((a, b) => {
    if (a.tier !== b.tier) return b.tier - a.tier;
    if (a.tier === 0) {                                        // group tier: position first…
      if (a.pos !== b.pos) return a.pos - b.pos;
      if (a.pts !== b.pts) return b.pts - a.pts;               // …then points
    }
    if (a.gd !== b.gd) return b.gd - a.gd;
    if (a.gf !== b.gf) return b.gf - a.gf;
    if (a.ga !== b.ga) return a.ga - b.ga;
    return a.t < b.t ? -1 : 1;
  });
  const rank = {};
  arr.forEach((x, i) => { rank[x.t] = i + 1; });
  return rank;
}

// Per-WC-team SETTLED stage from current results: knockout exits plus group-stage
// teams that are mathematically out — 4th in a completed group, or a 3rd-place team
// out of contention for the 8 best-third berths. A team with no entry here is still
// alive (its final placement isn't decided yet).
function computeWcTeamStage(state) {
  const wcTeamStage = { ...state.knockoutEliminated };
  const completedThirds = []; // { team, pts, gd, gf } from fully-played groups
  for (const [group, teamSet] of Object.entries(state.groupTeams)) {
    const gs = state.groupStandings[group] || {};
    const allPlayed = [...teamSet].every(t => (gs[t]?.gp ?? 0) >= 3);
    if (!allPlayed) continue;
    const sorted = sortGroup([...teamSet], gs);
    if (sorted[3] && wcTeamStage[sorted[3]] === undefined) wcTeamStage[sorted[3]] = STAGE.GROUP_ELIMINATED;
    if (sorted[2]) {
      const s = gs[sorted[2]] || { pts: 0, gf: 0, ga: 0 };
      completedThirds.push({ team: sorted[2], pts: s.pts, gd: s.gf - s.ga, gf: s.gf });
    }
  }
  // A 3rd-place team is out of contention once 8+ completed-group thirds rank
  // strictly above it (only 8 thirds advance), regardless of unfinished groups.
  const thirdBetter = (a, b) =>
    a.pts !== b.pts ? a.pts > b.pts : a.gd !== b.gd ? a.gd > b.gd : a.gf > b.gf;
  for (const t of completedThirds) {
    const better = completedThirds.filter(o => o.team !== t.team && thirdBetter(o, t)).length;
    if (better >= 8 && wcTeamStage[t.team] === undefined) wcTeamStage[t.team] = STAGE.GROUP_ELIMINATED;
  }
  return wcTeamStage;
}

function renderGrid(probs, currentEstimate, state, sortCol = currentSortCol) {
  const table = document.getElementById('grid');
  table.innerHTML = '';

  const wcTeamStage = computeWcTeamStage(state);
  const finalRanks = computeFinalRanks(state, wcTeamStage);

  const fantasyTeams = Object.keys(FANTASY_TEAMS);
  const sortedTeams = sortTeams(fantasyTeams, probs, sortCol, lastAdp);

  // Header
  const hr = document.createElement('tr');
  const cornerTh = `<th class="corner">Fantasy Team</th>`;
  const pickThs = Array.from({ length: 16 }, (_, i) => {
    let cls = 'sortable';
    if (sortCol === i) cls += currentSortDir === 'asc' ? ' sort-asc' : ' sort-desc';
    return `<th class="${cls}" data-pick="${i}">Pick ${i + 1}</th>`;
  }).join('');
  hr.innerHTML = cornerTh + pickThs;
  table.appendChild(hr);

  // Column header click → cycle: desc → asc → default
  hr.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = parseInt(th.dataset.pick);
      if (currentSortCol !== col) {
        currentSortCol = col;
        currentSortDir = 'desc';
      } else if (currentSortDir === 'desc') {
        currentSortDir = 'asc';
      } else {
        currentSortCol = null;
        currentSortDir = null;
      }
      if (lastProbs) renderGrid(lastProbs, lastEstimate, lastState, currentSortCol);
      if (lastTopOrders) renderTopOrders(lastTopOrders, lastProbs, lastAdp);
      syncChipSpacer();
    });
  });

  for (const team of sortedTeams) {
    const wcTeams = FANTASY_TEAMS[team];

    // ── Main row ──
    const row = document.createElement('tr');

    const td = document.createElement('td');
    td.className = 'team-name';
    td.innerHTML = `<span class="toggle">▶</span>${teamLogoImg(team)}${team}`;

    // Probability cells
    for (let pick = 0; pick < 16; pick++) {
      const pct = probs[team][pick];
      const { bg, text } = heatColor(pct);
      const cell = document.createElement('td');
      cell.className = 'prob-cell';
      cell.style.background = bg;
      cell.style.color = text;
      cell.textContent = `${pct.toFixed(1)}%`;
      cell.title = `${team} → Pick ${pick + 1}: ${pct.toFixed(1)}%`;
      row.appendChild(cell);
    }

    row.insertBefore(td, row.firstChild);
    table.appendChild(row);

    // ── Detail row ──
    const detailRow = document.createElement('tr');
    detailRow.className = 'detail-row hidden';

    const detailTd = document.createElement('td');
    detailTd.colSpan = 17;

    const inner = document.createElement('div');
    inner.className = 'detail-inner';

    for (const wc of wcTeams) {
      const s = wcTeamStage[wc];
      const settled = s !== undefined;            // out of the tournament (or finished)
      const style = settled ? STAGE_STYLE[s] : { bg: '#1e293b', color: '#64748b', label: 'In Progress' };
      // Eliminated = has a final stage and isn't the tournament winner.
      const eliminated = settled && s !== STAGE.WINNER;
      const gf = state.allTeamStats[wc]?.gf ?? 0;
      const ga = state.allTeamStats[wc]?.ga ?? 0;
      // Eliminated teams show their current overall finish rank instead of the
      // round they exited; the round label moves to a hover tooltip.
      const rank = finalRanks[wc];
      const label = settled && rank ? ordinal(rank) : style.label;
      const title = settled ? `${style.label} · current projected finish` : 'Still in the tournament';

      inner.innerHTML += `
        <div class="detail-team${eliminated ? ' eliminated' : ''}">
          ${flagImg(wc)}
          <span class="detail-team-name">${wc}</span>
          <span class="detail-stage" style="background:${style.bg};color:${style.color}" title="${title}">${label}</span>
          <span class="detail-goals">${gf} GF · ${ga} GA</span>
        </div>`;
    }

    detailTd.appendChild(inner);
    detailRow.appendChild(detailTd);
    table.appendChild(detailRow);

    // Toggle on click
    td.addEventListener('click', () => {
      const isOpen = !detailRow.classList.contains('hidden');
      detailRow.classList.toggle('hidden', isOpen);
      td.classList.toggle('expanded', !isOpen);
    });
  }
}

function buildLegend() {
  const bar = document.getElementById('legend-bar');
  const steps = 20;
  let html = '';
  for (let i = 0; i < steps; i++) {
    const pct = (i / steps) * 40;
    html += `<div style="background:${heatColor(pct).bg}"></div>`;
  }
  bar.innerHTML = html;
}

// ─── SIM COST TRACKER ───────────────────────────────────────────────────────
let lastSimCO2ug = null; // micrograms

const TROLL_LINES = [
  'you monster',
  'worth it?',
  'rip atmosphere',
  'polar bears felt that',
  'Al Gore is crying',
  'nice going, champ',
  'the ice caps know',
  'earth says ouch',
  'climate criminal',
  'greta is watching',
];

function calcSimCO2(durationMs) {
  // Assumes ~15W CPU draw during heavy JS, US grid at 386 gCO2/kWh
  const energyKwh = (durationMs / 1000) * 15 / 3_600_000;
  return energyKwh * 386 * 1e6; // micrograms
}

function renderSimCost() {
  const el = document.getElementById('sim-cost');
  if (!el) return;
  if (lastSimCO2ug === null) {
    el.innerHTML = `<span class="sim-cost-label">sim cost</span>
      <span class="sim-cost-val">—</span>
      <span class="sim-cost-troll">loading...</span>`;
    return;
  }
  let val, unit;
  if (lastSimCO2ug < 1000) { val = lastSimCO2ug.toFixed(1); unit = 'μg CO₂'; }
  else { val = (lastSimCO2ug / 1000).toFixed(2); unit = 'mg CO₂'; }
  const troll = TROLL_LINES[Math.floor(Math.random() * TROLL_LINES.length)];
  el.innerHTML = `
    <span class="sim-cost-label">per refresh</span>
    <span class="sim-cost-val">${val}</span>
    <span class="sim-cost-unit">${unit}</span>
    <span class="sim-cost-troll">${troll}</span>
    <span class="sim-cost-disclaimer">*nothing compared to CO₂ emitted by agents creating this product</span>`;
}

function syncChipSpacer() {
  const spacer = document.getElementById('chip-spacer');
  const chipRow = document.getElementById('chip-row');
  const firstProbCell = document.querySelector('#grid .prob-cell');
  if (spacer && chipRow && firstProbCell) {
    spacer.style.width = Math.max(0, firstProbCell.getBoundingClientRect().left - chipRow.getBoundingClientRect().left) + 'px';
  }
}

// ─── MAIN ────────────────────────────────────────────────────────────────────
let refreshTimer = null;
let isRunning = false;
let lastProbs = null;
let lastTopOrders = null;
let lastAdp = null;
let orderBannerMode = 'adp'; // 'adp' | 'likely'
let lastEstimate = null;
let lastState = null;
let lastWcTeamStage = null; // settled per-WC-team stages for the current state (scorecards)
let currentSortCol = null; // 0-15 = sort by that pick, null = unsorted (allocation order)
let currentSortDir = null; // 'desc' = high→low, 'asc' = low→high, null = unsorted

function sortTeams(fantasyTeams, probs, sortCol, adp) {
  return [...fantasyTeams].sort((a, b) => {
    if (sortCol !== null) {
      return currentSortDir === 'asc'
        ? probs[a][sortCol] - probs[b][sortCol]
        : probs[b][sortCol] - probs[a][sortCol];
    }
    // Default: follow active banner mode
    if (orderBannerMode === 'adp' && adp) {
      return (adp[a] ?? 99) - (adp[b] ?? 99);
    }
    const bestPickA = probs[a].indexOf(Math.max(...probs[a]));
    const bestPickB = probs[b].indexOf(Math.max(...probs[b]));
    return bestPickA - bestPickB;
  });
}

async function refresh() {
  if (isRunning) return;
  isRunning = true;
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;

  document.getElementById('status').innerHTML = '<span class="spinner"></span>Fetching live data…';

  try {
    const events = await fetchAllGames();
    document.getElementById('status').innerHTML = '<span class="spinner"></span>Running Monte Carlo simulation (10,000 runs)…';

    const state = parseTournamentState(events);

    // Run simulation asynchronously so browser can update the status text
    await new Promise(resolve => setTimeout(resolve, 30));

    // Prefer the committed snapshot when it covers exactly the current number of
    // completed games — then the grid is identical to the chart's right-most point
    // BY CONSTRUCTION (same data, not a re-simulation). Only fall back to a live
    // simulation when the live read is AHEAD of the latest snapshot (a game finished
    // since the last regen), in which case it legitimately has newer information.
    const snap = (window.HISTORY_DATA?.snapshots || []).find(
      s => s.matchesCompleted === state.completedCount);
    let probs, topOrders, adp, usedSnapshot = false;
    if (snap) {
      ({ probs, adp } = snap);
      // topOrders is optional on older snapshots — degrade to the ADP-expected order
      // rather than triggering a full re-simulation just because the field is absent.
      topOrders = snap.topOrders || [{ order: Object.keys(adp).sort((a, b) => adp[a] - adp[b]), pct: 0 }];
      lastSimCO2ug = 0;
      usedSnapshot = true;
    } else {
      const t0 = performance.now();
      ({ probs, topOrders, adp } = runMonteCarlo(state, 10000));
      lastSimCO2ug = calcSimCO2(performance.now() - t0);
    }
    const currentEstimate = getBestEstimate(state);

    lastProbs = probs;
    lastTopOrders = topOrders;
    lastAdp = adp;
    lastEstimate = currentEstimate;
    lastState = state;
    lastWcTeamStage = computeWcTeamStage(state);
    renderTopOrders(topOrders, probs, adp);
    renderGrid(probs, currentEstimate, state, currentSortCol);
    syncChipSpacer();

    const now = new Date();
    const pendingGames = events.length - state.completedCount;
    document.getElementById('status').textContent = `Last updated: ${now.toLocaleTimeString()} · ${state.completedCount} of ${events.length} games`;
    document.getElementById('stat-done').textContent = state.completedCount;
    document.getElementById('stat-left').textContent = pendingGames;

    // Warn about any unrecognized team names
    const knownTeams = new Set(Object.values(FANTASY_TEAMS).flat());
    const seenTeams = new Set();
    for (const e of events) {
      const comp = e.competitions?.[0];
      if (!comp) continue;
      for (const c of comp.competitors) seenTeams.add(normalize(c.team.displayName));
    }
    const missing = [...knownTeams].filter(t => !seenTeams.has(t));
    const simInfoEl = document.getElementById('sim-info');
    let infoText = usedSnapshot
      ? `Showing committed snapshot for ${state.completedCount} games (matches the history chart exactly) · 10,000-simulation Monte Carlo`
      : `Live Monte Carlo: 10,000 simulations · FIFA ranking-weighted goal model · Strength-weighted penalty shootouts`;
    if (missing.length > 0) {
      infoText += ` · ⚠ Teams not found in ESPN data: ${missing.join(', ')}`;
    }
    simInfoEl.textContent = infoText;

  } catch (err) {
    document.getElementById('status').innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
    console.error(err);
  }

  isRunning = false;
  btn.disabled = false;

  // Schedule next refresh in 5 minutes
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refresh, 5 * 60 * 1000);
}

buildLegend();
refresh();

// Custom plugin: draws team logo circles at the rightmost data point of each line
const teamIconPlugin = {
  id: 'teamIcons',
  afterDatasetsDraw(chart) {
    const { ctx, data } = chart;
    const SIZE = 22;
    data.datasets.forEach((ds, i) => {
      const meta = chart.getDatasetMeta(i);
      if (meta.hidden) return;
      const pt = meta.data[meta.data.length - 1];
      if (!pt) return;
      const img = teamImages[ds.label];
      if (!img?.complete || !img.naturalWidth) return;
      const x = pt.x + 6, y = pt.y - SIZE / 2;
      const cx = x + SIZE / 2, cy = y + SIZE / 2;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, SIZE / 2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(img, x, y, SIZE, SIZE);
      ctx.restore();
      ctx.beginPath();
      ctx.arc(cx, cy, SIZE / 2, 0, Math.PI * 2);
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#000';
      ctx.stroke();
    });
  },
};

function externalTooltip(context, isAdp) {
  const el = document.getElementById('history-tooltip');
  const tt = context.tooltip;
  if (tt.opacity === 0) { el.style.opacity = 0; return; }

  const items = (tt.dataPoints || [])
    .slice()
    .sort((a, b) => isAdp ? a.parsed.y - b.parsed.y : b.parsed.y - a.parsed.y);

  const title = `After ${items[0]?.parsed.x ?? ''} matches`;
  let html = `<div class="htt-title">${title}</div>`;
  for (const it of items) {
    const team = it.dataset.label;
    const v = it.parsed.y;
    const src = `assets/teams/${encodeURIComponent(team)}.png`;
    const val = isAdp ? v.toFixed(1) : v.toFixed(1) + '%';
    html += `<div class="htt-row">
      <img class="htt-logo" src="${src}" alt="" onerror="this.style.visibility='hidden'">
      <span>${team}</span><span class="htt-val">${val}</span></div>`;
  }
  el.innerHTML = html;

  const wrap = context.chart.canvas.parentNode;
  const wrapW = wrap.offsetWidth;
  let left = tt.caretX + 14;
  // Flip to the left of the cursor if it would overflow the container
  if (left + el.offsetWidth > wrapW) left = tt.caretX - el.offsetWidth - 14;
  el.style.left = Math.max(0, left) + 'px';
  el.style.top = Math.max(0, tt.caretY - el.offsetHeight / 2) + 'px';
  el.style.opacity = 1;
}

function buildHistoryTabs() {
  const container = document.getElementById('history-tabs');
  let html = '';
  for (let i = 0; i < 16; i++) {
    html += `<button class="htab${i === 0 ? ' htab-active' : ''}" data-pick="${i}">Pick ${i + 1}</button>`;
  }
  html += `<button class="htab htab-adp" data-pick="adp">ADP</button>`;
  container.innerHTML = html;
  container.addEventListener('click', e => {
    const btn = e.target.closest('.htab');
    if (!btn) return;
    container.querySelectorAll('.htab').forEach(b => b.classList.remove('htab-active'));
    btn.classList.add('htab-active');
    activePickTab = btn.dataset.pick === 'adp' ? 'adp' : parseInt(btn.dataset.pick);
    renderHistoryChart();
  });
}

function renderHistoryChart() {
  if (!historyData) return;
  const canvas = document.getElementById('history-chart');
  const noData = document.getElementById('history-no-data');
  canvas.style.display = 'block';
  noData.style.display = 'none';

  const isAdp = activePickTab === 'adp';

  const datasets = TEAM_LIST.map((team, i) => ({
    label: team,
    data: historyData.snapshots.map(s => ({
      x: s.matchesCompleted,
      y: isAdp ? s.adp[team] : s.probs[team]?.[activePickTab] ?? 0,
    })),
    borderColor: HISTORY_COLORS[i % HISTORY_COLORS.length],
    backgroundColor: 'transparent',
    borderWidth: 1.5,
    pointRadius: 0,
    pointHoverRadius: 4,
    tension: 0.3,
  }));

  // Compute y-axis bounds from the displayed series BEFORE building the config,
  // so the scale and the line geometry are consistent (mutating min/max after
  // creation moves the ticks but not the points).
  const allVals = historyData.snapshots.flatMap(s =>
    TEAM_LIST.map(team => isAdp ? s.adp[team] : (s.probs[team]?.[activePickTab] ?? 0))
  );
  const dataMin = Math.min(...allVals);
  const dataMax = Math.max(...allVals);
  let yMin, yMax;
  if (isAdp) {
    yMin = Math.max(1, Math.floor(dataMin - 0.5));
    yMax = Math.min(16, Math.ceil(dataMax + 0.5));
  } else {
    yMin = 0;
    yMax = Math.min(100, Math.ceil((dataMax + 2) / 5) * 5);
  }

  const yScale = isAdp ? {
    reverse: true,
    min: yMin, max: yMax,
    ticks: { color: '#666', font: { size: 11 }, stepSize: 1 },
    grid: { color: 'rgba(255,255,255,0.05)' },
    title: { display: true, text: 'Avg Draft Position', color: '#666', font: { size: 11 } },
  } : {
    min: yMin, max: yMax,
    ticks: { color: '#666', font: { size: 11 }, callback: v => v + '%' },
    grid: { color: 'rgba(255,255,255,0.05)' },
    title: { display: true, text: 'Probability', color: '#666', font: { size: 11 } },
  };

  if (historyChart) historyChart.destroy();
  historyChart = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { right: 34 } },
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          type: 'linear',
          min: 0, max: 104,
          ticks: { color: '#666', font: { size: 11 }, stepSize: 8 },
          grid: { color: 'rgba(255,255,255,0.05)' },
          title: { display: true, text: 'Matches Completed', color: '#666', font: { size: 11 } },
        },
        y: yScale,
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: false,
          external: ctx => externalTooltip(ctx, isAdp),
        },
      },
    },
    plugins: [teamIconPlugin],
  });
}

function loadHistoryData() {
  if (window.HISTORY_DATA) {
    historyData = window.HISTORY_DATA;
    renderHistoryChart();
  }
  // If history-data.js wasn't loaded, placeholder message stays visible
}

preloadTeamImages();
buildHistoryTabs();
loadHistoryData();
</script>
</body>
</html>
