<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC 2026 Fantasy Draft Order</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

    header { padding: 1.25rem 2rem; border-bottom: 1px solid #1e293b; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    h1 { font-size: 1.25rem; font-weight: 700; color: #f8fafc; }
    #status { font-size: 0.8rem; color: #64748b; margin-top: 0.2rem; }

    .controls { padding: 0.75rem 2rem; display: flex; gap: 0.75rem; align-items: center; border-bottom: 1px solid #1e293b; }
    button { background: #1e40af; color: white; border: none; padding: 0.35rem 0.9rem; border-radius: 5px; cursor: pointer; font-size: 0.8rem; transition: background 0.15s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #334155; cursor: not-allowed; }
    .auto-refresh { font-size: 0.75rem; color: #475569; }

    .grid-wrapper { padding: 1.25rem 2rem 1.5rem; overflow-x: auto; }

    table { border-collapse: collapse; font-size: 0.75rem; white-space: nowrap; }

    th {
      background: #1e293b;
      padding: 0.45rem 0.6rem;
      text-align: center;
      font-weight: 600;
      color: #94a3b8;
      border: 1px solid #0f172a;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    th.corner {
      text-align: left;
      color: #475569;
      position: sticky;
      left: 0;
      z-index: 3;
    }

    .team-name {
      padding: 0.4rem 1rem 0.4rem 0.6rem;
      white-space: nowrap;
      color: #cbd5e1;
      font-weight: 500;
      background: #0f172a;
      position: sticky;
      left: 0;
      z-index: 1;
      border-right: 1px solid #1e293b;
      border-bottom: 1px solid #1a2744;
    }
    tr:hover .team-name { color: #f8fafc; background: #0d1b2e; }

    .prob-cell {
      width: 62px;
      min-width: 62px;
      text-align: center;
      padding: 0.4rem 0.2rem;
      font-size: 0.72rem;
      font-weight: 600;
      border: 1px solid rgba(0,0,0,0.2);
      cursor: default;
      transition: filter 0.1s;
    }
    .prob-cell:hover { filter: brightness(1.25); }

    .legend {
      padding: 0 2rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.72rem;
      color: #475569;
    }
    .legend-bar {
      display: flex;
      height: 10px;
      width: 180px;
      border-radius: 3px;
      overflow: hidden;
    }

    .sim-info {
      padding: 0 2rem 1.5rem;
      font-size: 0.72rem;
      color: #334155;
      line-height: 1.6;
    }

    .error { color: #f87171; padding: 2rem; font-size: 0.9rem; }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid #334155;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stage-badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      background: #1e293b;
      color: #94a3b8;
      margin-left: 0.5rem;
    }

    .team-name { cursor: pointer; user-select: none; }
    .team-name .toggle { display: inline-block; width: 1rem; color: #334155; font-size: 0.65rem; transition: transform 0.15s; }
    .team-name.expanded .toggle { transform: rotate(90deg); color: #60a5fa; }
    .team-name.expanded { color: #f8fafc; }

    .detail-row td { background: #0a1628; border-bottom: 1px solid #1e293b; padding: 0; }
    .detail-row.hidden { display: none; }
    .detail-inner {
      display: flex;
      gap: 1.5rem;
      padding: 0.5rem 1rem 0.5rem 1.8rem;
      flex-wrap: wrap;
    }
    .detail-team {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .detail-team-name { color: #cbd5e1; font-weight: 500; }
    .detail-stage {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-weight: 600;
    }
    .detail-goals { font-size: 0.65rem; color: #475569; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>⚽ WC 2026 Fantasy Draft Order</h1>
      <div id="status"><span class="spinner"></span>Loading...</div>
    </div>
  </header>
  <div class="controls">
    <button id="refresh-btn" onclick="refresh()" disabled>↻ Refresh</button>
    <span class="auto-refresh">Auto-refreshes every 5 min</span>
  </div>
  <div class="grid-wrapper">
    <table id="grid"></table>
  </div>
  <div class="legend">
    <span>0%</span>
    <div class="legend-bar" id="legend-bar"></div>
    <span>High %</span>
    <span style="margin-left:1rem;color:#334155">· Darker = lower probability · Brighter = higher probability</span>
  </div>
  <div class="sim-info" id="sim-info"></div>

<script>
// ─── FANTASY TEAM ALLOCATIONS ───────────────────────────────────────────────
const FANTASY_TEAMS = {
  'Kurlewis':      ['Iran', 'Egypt', 'Saudi Arabia'],
  'Seamen':        ['Colombia', 'New Zealand', 'Norway'],
  'A&T':           ['Canada', 'Sweden', 'England'],
  'Barons':        ['Spain', 'Türkiye', 'Haiti'],
  'SDs':           ['Portugal', 'Ghana', 'Germany'],
  'Dirty Birds':   ['Ivory Coast', 'Netherlands', 'USA'],
  'Aligators':     ['South Korea', 'Iraq', 'Tunisia'],
  'Dynamiss':      ['Qatar', 'Senegal', 'Austria'],
  'SERPION':       ['Jordan', 'Switzerland', 'Australia'],
  'Fishies':       ['Belgium', 'Czechia', 'DR Congo'],
  'Piggies':       ['Uzbekistan', 'Bosnia & Herzegovina', 'France'],
  'Puffins':       ['South Africa', 'Scotland', 'Curaçao'],
  'Ester':         ['Ecuador', 'Mexico', 'Uruguay'],
  'Puddings':      ['Argentina', 'Algeria', 'Brazil'],
  'Leeanacondas':  ['Panama', 'Cabo Verde', 'Japan'],
  'Pat':           ['Morocco', 'Croatia', 'Paraguay'],
};

// ESPN display name → canonical name used above
const ESPN_NORMALIZE = {
  'United States':        'USA',
  'Bosnia-Herzegovina':   'Bosnia & Herzegovina',
  "Côte d'Ivoire":        'Ivory Coast',
  'Korea Republic':       'South Korea',
  'Republic of Korea':    'South Korea',
  'Congo DR':             'DR Congo',
  'Cape Verde':           'Cabo Verde',
  'Cabo Verde':           'Cabo Verde',
  'Curacao':              'Curaçao',
  'Turkey':               'Türkiye',
  'Czech Republic':       'Czechia',
  'New Zealand':          'New Zealand',
  'DR Congo':             'DR Congo',
};

function normalize(name) {
  return ESPN_NORMALIZE[name] || name;
}

// ─── STAGE ENUM ─────────────────────────────────────────────────────────────
const STAGE = {
  GROUP_ELIMINATED: 0,
  R32_ELIMINATED:   1,
  R16_ELIMINATED:   2,
  QF_ELIMINATED:    3,
  SF_LOST_3RD:      4,
  SF_WON_3RD:       5,
  RUNNER_UP:        6,
  WINNER:           7,
};

const STAGE_LABEL = {
  0: 'Group Out',
  1: 'R32 Out',
  2: 'R16 Out',
  3: 'QF Out',
  4: '4th Place',
  5: '3rd Place',
  6: 'Runner-up',
  7: 'Winner',
};

// ─── ROUND DETECTION ────────────────────────────────────────────────────────
function parseRound(event) {
  const note = (event.competitions[0]?.altGameNote || '').toLowerCase();
  const date = event.date.substring(0, 10);

  if (note.includes('group'))                                     return 'GROUP';
  if (note.includes('round of 32'))                              return 'R32';
  if (note.includes('round of 16') || note.includes('rd of 16')) return 'R16';
  if (note.includes('quarterfinal') || note.includes('quarter')) return 'QF';
  if (note.includes('third') || note.includes('3rd'))            return 'THIRD';
  if (note.includes('semifinal') || note.includes('semi'))       return 'SF';
  if (note.includes('final'))                                     return 'FINAL';

  // Date-based fallback
  if (date >= '2026-07-19') return 'FINAL';
  if (date >= '2026-07-18') return 'THIRD';
  if (date >= '2026-07-14') return 'SF';
  if (date >= '2026-07-09') return 'QF';
  if (date >= '2026-07-04') return 'R16';
  if (date >= '2026-06-28') return 'R32';
  return 'GROUP';
}

// ─── DATA FETCHING ───────────────────────────────────────────────────────────
async function fetchAllGames() {
  const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200';
  const res = await fetch(url);
  if (!res.ok) throw new Error(`ESPN API ${res.status}`);
  const data = await res.json();
  return data.events || [];
}

// ─── STATE PARSING ───────────────────────────────────────────────────────────
function parseTournamentState(events) {
  const groupStandings = {};   // group → { team → { pts, gf, ga, gp } }
  const groupTeams = {};       // group → Set of team names
  const groupGames = [];       // all group-stage game objects
  const allTeamStats = {};     // team → { gf, ga } (real stats from completed games)
  const knockoutEliminated = {};  // team → STAGE value (for completed knockout)
  const knockoutAlive = new Set(); // teams known to have won a knockout game

  function statsOf(name) {
    if (!allTeamStats[name]) allTeamStats[name] = { gf: 0, ga: 0 };
    return allTeamStats[name];
  }

  for (const event of events) {
    const round = parseRound(event);
    const comp = event.competitions[0];
    if (!comp || comp.competitors.length < 2) continue;

    const c0 = comp.competitors[0], c1 = comp.competitors[1];
    const home = normalize(c0.team.displayName);
    const away = normalize(c1.team.displayName);
    const done = comp.status.type.completed;
    const hg = done ? parseInt(c0.score || '0') : null;
    const ag = done ? parseInt(c1.score || '0') : null;
    const homeWin = done ? !!c0.winner : null;
    const awayWin = done ? !!c1.winner : null;

    if (round === 'GROUP') {
      const m = (comp.altGameNote || '').match(/Group ([A-L])/i);
      const group = m ? m[1].toUpperCase() : null;

      if (group) {
        if (!groupTeams[group]) groupTeams[group] = new Set();
        groupTeams[group].add(home);
        groupTeams[group].add(away);

        if (!groupStandings[group]) groupStandings[group] = {};
        const gs = groupStandings[group];
        if (!gs[home]) gs[home] = { pts: 0, gf: 0, ga: 0, gp: 0 };
        if (!gs[away]) gs[away] = { pts: 0, gf: 0, ga: 0, gp: 0 };

        if (done && hg !== null) {
          gs[home].gp++; gs[away].gp++;
          gs[home].gf += hg; gs[home].ga += ag;
          gs[away].gf += ag; gs[away].ga += hg;
          if (homeWin)       { gs[home].pts += 3; }
          else if (awayWin)  { gs[away].pts += 3; }
          else               { gs[home].pts += 1; gs[away].pts += 1; }

          statsOf(home).gf += hg; statsOf(home).ga += ag;
          statsOf(away).gf += ag; statsOf(away).ga += hg;
        }
      }
      groupGames.push({ home, away, hg, ag, homeWin, awayWin, done, group });

    } else {
      // Knockout
      if (done && hg !== null) {
        statsOf(home).gf += hg; statsOf(home).ga += ag;
        statsOf(away).gf += ag; statsOf(away).ga += hg;

        const loser  = homeWin ? away : (awayWin ? home : null);
        const winner = homeWin ? home : (awayWin ? away : null);

        if (round === 'FINAL') {
          if (loser)  knockoutEliminated[loser]  = STAGE.RUNNER_UP;
          if (winner) knockoutEliminated[winner] = STAGE.WINNER;
        } else if (round === 'THIRD') {
          if (loser)  knockoutEliminated[loser]  = STAGE.SF_LOST_3RD;
          if (winner) knockoutEliminated[winner] = STAGE.SF_WON_3RD;
        } else {
          const stageMap = { R32: STAGE.R32_ELIMINATED, R16: STAGE.R16_ELIMINATED, QF: STAGE.QF_ELIMINATED, SF: STAGE.SF_LOST_3RD };
          if (loser) knockoutEliminated[loser] = stageMap[round] ?? STAGE.R32_ELIMINATED;
          if (winner && round !== 'SF') knockoutAlive.add(winner);
        }
      }
    }
  }

  const completedCount = events.filter(e => e.competitions[0]?.status?.type?.completed).length;
  return { groupStandings, groupTeams, groupGames, allTeamStats, knockoutEliminated, knockoutAlive, completedCount };
}

// ─── SIMULATION ENGINE ───────────────────────────────────────────────────────
function poisson(lambda) {
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sortGroup(teams, standings) {
  return [...teams].sort((a, b) => {
    const sa = standings[a] || { pts: 0, gf: 0, ga: 0, gp: 0 };
    const sb = standings[b] || { pts: 0, gf: 0, ga: 0, gp: 0 };
    if (sb.pts !== sa.pts) return sb.pts - sa.pts;
    const gdB = sb.gf - sb.ga, gdA = sa.gf - sa.ga;
    if (gdB !== gdA) return gdB - gdA;
    if (sb.gf !== sa.gf) return sb.gf - sa.gf;
    return Math.random() - 0.5;
  });
}

function runOneSimulation(state) {
  const { groupStandings: baseSt, groupTeams, groupGames, allTeamStats, knockoutEliminated, knockoutAlive } = state;

  // Clone group standings
  const st = {};
  for (const [g, teams] of Object.entries(baseSt)) {
    st[g] = {};
    for (const [t, s] of Object.entries(teams)) st[g][t] = { ...s };
  }

  // Clone team stats
  const stats = {};
  for (const [t, s] of Object.entries(allTeamStats)) stats[t] = { ...s };
  function statsOf(t) { if (!stats[t]) stats[t] = { gf: 0, ga: 0 }; return stats[t]; }

  // Simulate remaining group games
  for (const g of groupGames) {
    if (g.done || !g.group) continue;
    const hg = poisson(1.3), ag = poisson(1.3);
    if (!st[g.group]) st[g.group] = {};
    const gs = st[g.group];
    if (!gs[g.home]) gs[g.home] = { pts: 0, gf: 0, ga: 0, gp: 0 };
    if (!gs[g.away]) gs[g.away] = { pts: 0, gf: 0, ga: 0, gp: 0 };
    gs[g.home].gp++; gs[g.away].gp++;
    gs[g.home].gf += hg; gs[g.home].ga += ag;
    gs[g.away].gf += ag; gs[g.away].ga += hg;
    if (hg > ag)      { gs[g.home].pts += 3; }
    else if (ag > hg) { gs[g.away].pts += 3; }
    else              { gs[g.home].pts += 1; gs[g.away].pts += 1; }
    statsOf(g.home).gf += hg; statsOf(g.home).ga += ag;
    statsOf(g.away).gf += ag; statsOf(g.away).ga += hg;
  }

  // Determine 32 qualifiers
  const qualifiers = new Set();
  const stage = {};
  const thirdCandidates = [];

  for (const [group, teamSet] of Object.entries(groupTeams)) {
    const sorted = sortGroup([...teamSet], st[group] || {});
    if (sorted[0]) qualifiers.add(sorted[0]);
    if (sorted[1]) qualifiers.add(sorted[1]);
    if (sorted[2]) {
      const s = (st[group] || {})[sorted[2]] || { pts: 0, gf: 0, ga: 0 };
      thirdCandidates.push({ team: sorted[2], pts: s.pts, gd: s.gf - s.ga, gf: s.gf });
    }
    if (sorted[3]) stage[sorted[3]] = STAGE.GROUP_ELIMINATED;
  }

  // Best 8 of 12 third-place teams advance
  thirdCandidates.sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd  !== a.gd)  return b.gd  - a.gd;
    if (b.gf  !== a.gf)  return b.gf  - a.gf;
    return Math.random() - 0.5;
  });
  for (let i = 0; i < thirdCandidates.length; i++) {
    if (i < 8) qualifiers.add(thirdCandidates[i].team);
    else stage[thirdCandidates[i].team] = STAGE.GROUP_ELIMINATED;
  }

  // Apply known knockout results
  for (const [team, s] of Object.entries(knockoutEliminated)) stage[team] = s;

  // Build current alive list (qualifiers not yet eliminated, plus known knockout winners)
  const alreadyElim = new Set(Object.keys(knockoutEliminated));
  let alive = [...qualifiers, ...knockoutAlive].filter(t => !alreadyElim.has(t));
  // Deduplicate
  alive = [...new Set(alive)];

  // Simulate knockout rounds
  let sfLosers = [];
  for (const round of ['R32', 'R16', 'QF', 'SF']) {
    if (alive.length < 2) break;
    const pairs = shuffle(alive);
    const winners = [], losers = [];
    for (let i = 0; i + 1 < pairs.length; i += 2) {
      const [t1, t2] = [pairs[i], pairs[i + 1]];
      const hg = poisson(1.3), ag = poisson(1.3);
      const t1wins = hg > ag || (hg === ag && Math.random() < 0.5);
      winners.push(t1wins ? t1 : t2);
      const loser = t1wins ? t2 : t1;
      losers.push(loser);
      if (!stage[loser]) {
        stage[loser] = { R32: STAGE.R32_ELIMINATED, R16: STAGE.R16_ELIMINATED, QF: STAGE.QF_ELIMINATED, SF: STAGE.SF_LOST_3RD }[round];
      }
      statsOf(t1).gf += hg; statsOf(t1).ga += ag;
      statsOf(t2).gf += ag; statsOf(t2).ga += hg;
    }
    if (round === 'SF') sfLosers = losers;
    alive = winners;
  }

  // 3rd place match
  if (sfLosers.length >= 2) {
    const [l1, l2] = sfLosers;
    if (Math.random() < 0.5) { stage[l1] = STAGE.SF_WON_3RD; stage[l2] = STAGE.SF_LOST_3RD; }
    else                      { stage[l2] = STAGE.SF_WON_3RD; stage[l1] = STAGE.SF_LOST_3RD; }
  } else if (sfLosers.length === 1) {
    stage[sfLosers[0]] = STAGE.SF_LOST_3RD;
  }

  // Final
  if (alive.length >= 2) {
    const [f1, f2] = alive;
    const hg = poisson(1.3), ag = poisson(1.3);
    const f1wins = hg > ag || (hg === ag && Math.random() < 0.5);
    stage[f1wins ? f1 : f2] = STAGE.WINNER;
    stage[f1wins ? f2 : f1] = STAGE.RUNNER_UP;
    statsOf(f1).gf += hg; statsOf(f1).ga += ag;
    statsOf(f2).gf += ag; statsOf(f2).ga += hg;
  } else if (alive.length === 1) {
    stage[alive[0]] = STAGE.WINNER;
  }

  return { stage, stats };
}

function rankFantasyTeams(stage, stats) {
  return Object.keys(FANTASY_TEAMS)
    .map(team => {
      const wcTeams = FANTASY_TEAMS[team];
      const stages = wcTeams.map(t => stage[t] ?? STAGE.GROUP_ELIMINATED).sort((a, b) => b - a);
      const totalGF = wcTeams.reduce((s, t) => s + (stats[t]?.gf || 0), 0);
      const totalGA = wcTeams.reduce((s, t) => s + (stats[t]?.ga || 0), 0);
      return { team, stages, totalGF, totalGA };
    })
    .sort((a, b) => {
      for (let i = 0; i < 3; i++) {
        const diff = (b.stages[i] ?? 0) - (a.stages[i] ?? 0);
        if (diff !== 0) return diff;
      }
      if (b.totalGF !== a.totalGF) return b.totalGF - a.totalGF;
      if (a.totalGA !== b.totalGA) return a.totalGA - b.totalGA;
      return Math.random() - 0.5; // coin flip
    })
    .map(s => s.team);
}

function runMonteCarlo(state, N = 10000) {
  const teams = Object.keys(FANTASY_TEAMS);
  const counts = {};
  for (const t of teams) counts[t] = new Array(16).fill(0);

  for (let i = 0; i < N; i++) {
    const { stage, stats } = runOneSimulation(state);
    const ranked = rankFantasyTeams(stage, stats);
    ranked.forEach((team, idx) => counts[team][idx]++);
  }

  const probs = {};
  for (const t of teams) probs[t] = counts[t].map(c => (c / N) * 100);
  return probs;
}

// ─── CURRENT BEST ESTIMATE (deterministic) ──────────────────────────────────
function getBestEstimate(state) {
  // Use current known results, treat all unknowns as "alive" at group level
  const { groupStandings, groupTeams, allTeamStats, knockoutEliminated } = state;
  const stage = { ...knockoutEliminated };

  // For group stage, mark clearly eliminated teams (mathematically out)
  for (const [group, teamSet] of Object.entries(groupTeams)) {
    const sorted = sortGroup([...teamSet], groupStandings[group] || {});
    // Only mark 4th place if all games in group are played
    const gs = groupStandings[group] || {};
    const allPlayed = [...teamSet].every(t => (gs[t]?.gp ?? 0) >= 3);
    if (allPlayed) {
      if (sorted[3] && !stage[sorted[3]]) stage[sorted[3]] = STAGE.GROUP_ELIMINATED;
    }
  }

  // Score fantasy teams on current known results
  return Object.keys(FANTASY_TEAMS).map(team => {
    const wcTeams = FANTASY_TEAMS[team];
    const stages = wcTeams.map(t => stage[t] ?? STAGE.GROUP_ELIMINATED).sort((a, b) => b - a);
    const totalGF = wcTeams.reduce((s, t) => s + (allTeamStats[t]?.gf || 0), 0);
    const totalGA = wcTeams.reduce((s, t) => s + (allTeamStats[t]?.ga || 0), 0);
    return { team, stages, totalGF, totalGA };
  });
}

// ─── HEAT MAP COLOR ─────────────────────────────────────────────────────────
function heatColor(pct) {
  // 0% → near-black, high% → bright teal/green
  if (pct < 0.5) return { bg: '#0d1b2e', text: 'transparent' };
  const t = Math.min(pct / 40, 1); // saturate at 40%
  // Interpolate: dark navy → teal-green
  const r = Math.round(13  + t * (34 - 13));
  const g = Math.round(27  + t * (197 - 27));
  const b = Math.round(46  + t * (94 - 46));
  const textOpacity = 0.4 + t * 0.6;
  return {
    bg: `rgb(${r},${g},${b})`,
    text: `rgba(255,255,255,${textOpacity})`
  };
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const STAGE_STYLE = {
  0: { bg: '#2a1212', color: '#f87171', label: 'Group Out' },
  1: { bg: '#2a1e10', color: '#fb923c', label: 'R32 Out' },
  2: { bg: '#2a2710', color: '#fbbf24', label: 'R16 Out' },
  3: { bg: '#162810', color: '#86efac', label: 'QF Out' },
  4: { bg: '#0f2a1e', color: '#34d399', label: '4th Place' },
  5: { bg: '#0f2a1e', color: '#34d399', label: '3rd Place' },
  6: { bg: '#0f1f2a', color: '#60a5fa', label: 'Runner-up' },
  7: { bg: '#2a2410', color: '#fcd34d', label: 'Winner' },
};

function renderGrid(probs, currentEstimate, state) {
  const table = document.getElementById('grid');
  table.innerHTML = '';

  // Build per-WC-team stage from state
  const wcTeamStage = { ...state.knockoutEliminated };

  // Sort fantasy teams by most likely pick (pick with highest prob)
  const fantasyTeams = Object.keys(FANTASY_TEAMS);
  const sortedTeams = [...fantasyTeams].sort((a, b) => {
    const bestPickA = probs[a].indexOf(Math.max(...probs[a]));
    const bestPickB = probs[b].indexOf(Math.max(...probs[b]));
    return bestPickA - bestPickB;
  });

  // Header
  const hr = document.createElement('tr');
  let hHTML = '<th class="corner">Fantasy Team</th>';
  for (let i = 1; i <= 16; i++) hHTML += `<th>Pick ${i}</th>`;
  hr.innerHTML = hHTML;
  table.appendChild(hr);

  for (const team of sortedTeams) {
    const wcTeams = FANTASY_TEAMS[team];

    // ── Main row ──
    const row = document.createElement('tr');

    const td = document.createElement('td');
    td.className = 'team-name';
    td.innerHTML = `<span class="toggle">▶</span>${team}`;

    // Probability cells
    for (let pick = 0; pick < 16; pick++) {
      const pct = probs[team][pick];
      const { bg, text } = heatColor(pct);
      const cell = document.createElement('td');
      cell.className = 'prob-cell';
      cell.style.background = bg;
      cell.style.color = text;
      cell.textContent = pct >= 1 ? `${pct.toFixed(0)}%` : (pct >= 0.5 ? `${pct.toFixed(1)}%` : '');
      cell.title = `${team} → Pick ${pick + 1}: ${pct.toFixed(1)}%`;
      row.appendChild(cell);
    }

    row.insertBefore(td, row.firstChild);
    table.appendChild(row);

    // ── Detail row ──
    const detailRow = document.createElement('tr');
    detailRow.className = 'detail-row hidden';

    const detailTd = document.createElement('td');
    detailTd.colSpan = 17;

    const inner = document.createElement('div');
    inner.className = 'detail-inner';

    for (const wc of wcTeams) {
      const s = wcTeamStage[wc];
      const style = s !== undefined ? STAGE_STYLE[s] : { bg: '#1e293b', color: '#64748b', label: 'In Progress' };
      const gf = state.allTeamStats[wc]?.gf ?? 0;
      const ga = state.allTeamStats[wc]?.ga ?? 0;

      inner.innerHTML += `
        <div class="detail-team">
          <span class="detail-team-name">${wc}</span>
          <span class="detail-stage" style="background:${style.bg};color:${style.color}">${style.label}</span>
          <span class="detail-goals">${gf} GF · ${ga} GA</span>
        </div>`;
    }

    detailTd.appendChild(inner);
    detailRow.appendChild(detailTd);
    table.appendChild(detailRow);

    // Toggle on click
    td.addEventListener('click', () => {
      const isOpen = !detailRow.classList.contains('hidden');
      detailRow.classList.toggle('hidden', isOpen);
      td.classList.toggle('expanded', !isOpen);
    });
  }
}

function buildLegend() {
  const bar = document.getElementById('legend-bar');
  const steps = 20;
  let html = '';
  for (let i = 0; i < steps; i++) {
    const pct = (i / steps) * 40;
    html += `<div style="background:${heatColor(pct).bg}"></div>`;
  }
  bar.innerHTML = html;
}

// ─── MAIN ────────────────────────────────────────────────────────────────────
let refreshTimer = null;
let isRunning = false;

async function refresh() {
  if (isRunning) return;
  isRunning = true;
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;

  document.getElementById('status').innerHTML = '<span class="spinner"></span>Fetching live data…';

  try {
    const events = await fetchAllGames();
    document.getElementById('status').innerHTML = '<span class="spinner"></span>Running Monte Carlo simulation (10,000 runs)…';

    const state = parseTournamentState(events);

    // Run simulation asynchronously so browser can update the status text
    await new Promise(resolve => setTimeout(resolve, 30));

    const probs = runMonteCarlo(state, 10000);
    const currentEstimate = getBestEstimate(state);

    renderGrid(probs, currentEstimate, state);

    const now = new Date();
    const pendingGames = events.length - state.completedCount;
    document.getElementById('status').textContent =
      `Last updated: ${now.toLocaleTimeString()} · ${state.completedCount} of ${events.length} games completed · ${pendingGames} remaining`;

    // Warn about any unrecognized team names
    const knownTeams = new Set(Object.values(FANTASY_TEAMS).flat());
    const seenTeams = new Set();
    for (const e of events) {
      const comp = e.competitions?.[0];
      if (!comp) continue;
      for (const c of comp.competitors) seenTeams.add(normalize(c.team.displayName));
    }
    const missing = [...knownTeams].filter(t => !seenTeams.has(t));
    const simInfoEl = document.getElementById('sim-info');
    let infoText = `Monte Carlo: 10,000 simulations · Goal model: Poisson(λ=1.3) per team · 50/50 knockout tiebreaks`;
    if (missing.length > 0) {
      infoText += ` · ⚠ Teams not found in ESPN data: ${missing.join(', ')}`;
    }
    simInfoEl.textContent = infoText;

  } catch (err) {
    document.getElementById('status').innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
    console.error(err);
  }

  isRunning = false;
  btn.disabled = false;

  // Schedule next refresh in 5 minutes
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refresh, 5 * 60 * 1000);
}

buildLegend();
refresh();
</script>
